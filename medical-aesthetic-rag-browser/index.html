1925cf_医美到底怎么做 之仪器篇/016.jpg) 但热玛吉这类抗衰的机器在国内非常尴尬 热玛吉至今发展到五代，唯独只有四代，在国内获批了医疗器械且适应症为皮肤紧致的许可证 五代只有生活美容仪器的证，不过好在官方处于睁只眼闭只眼，完了给你两年时间整改拿医疗证的缓冲期 魔幻程度堪比我不是药神 这还是保证机器是正品的前提下，没把山寨机和回充头的情况算进来 价格也是鱼目混珠鱼龙混杂，有些医生联合博主抬咖，把自己的技术吹的神乎其神，绝无仅有，一个热玛吉收"}, {"lane": "graph", "article_key": "d5bd7a186450f4caa9a518b053e48b4ef7393968", "account_slug": "05-lingjie-plastic-surgery", "title": "季节性医美时刻表（上）：春夏季，做什么项目效果翻倍？", "source_url": "http://mp.weixin.qq.com/s?__biz=MzI2ODA0NTk3OQ==&mid=2456021174&idx=1&sn=c073e3206fd2a7db67c275512a1e4269&chksm=fd62d342ca155a54baf62631e7ff1d4af5372c6c7248c41cc355894db3d9529b577880456d4c#rd", "quote_or_snippet": "（CO2点阵等）： 恢复期长，需要严格避免日晒和出汗，夏季护理难度大，易色沉。  · 大面积创伤性手术 （如大面积吸脂、隆胸）：包扎厚重，炎热天气下不适感强，感染风险相对增高。  · 假体隆鼻： 切口在鼻孔内，夏季易出汗，护理需格外小心。  玲姐给你的春夏医美行动清单  1. 首要任务：祛斑、脱毛。 这"}, {"lane": "graph", "article_key": "d5bd7a186450f4caa9a518b053e48b4ef7393968", "account_slug": "05-lingjie-plastic-surgery", "title": "季节性医美时刻表（上）：春夏季，做什么项目效果翻倍？", "source_url": "http://mp.weixin.qq.com/s?__biz=MzI2ODA0NTk3OQ==&mid=2456021174&idx=1&sn=c073e3206fd2a7db67c275512a1e4269&chksm=fd62d342ca155a54baf62631e7ff1d4af5372c6c7248c41cc355894db3d9529b577880456d4c#rd", "quote_or_snippet": "（CO2点阵等）： 恢复期长，需要严格避免日晒和出汗，夏季护理难度大，易色沉。  · 大面积创伤性手术 （如大面积吸脂、隆胸）：包扎厚重，炎热天气下不适感强，感染风险相对增高。  · 假体隆鼻： 切口在鼻孔内，夏季易出汗，护理需格外小心。  玲姐给你的春夏医美行动清单  1. 首要任务：祛斑、脱毛。 这"}, {"lane": "graph", "article_key": "d5bd7a186450f4caa9a518b053e48b4ef7393968", "account_slug": "05-lingjie-plastic-surgery", "title": "季节性医美时刻表（上）：春夏季，做什么项目效果翻倍？", "source_url": "http://mp.weixin.qq.com/s?__biz=MzI2ODA0NTk3OQ==&mid=2456021174&idx=1&sn=c073e3206fd2a7db67c275512a1e4269&chksm=fd62d342ca155a54baf62631e7ff1d4af5372c6c7248c41cc355894db3d9529b577880456d4c#rd", "quote_or_snippet": "（CO2点阵等）： 恢复期长，需要严格避免日晒和出汗，夏季护理难度大，易色沉。  · 大面积创伤性手术 （如大面积吸脂、隆胸）：包扎厚重，炎热天气下不适感强，感染风险相对增高。  · 假体隆鼻： 切口在鼻孔内，夏季易出汗，护理需格外小心。  玲姐给你的春夏医美行动清单  1. 首要任务：祛斑、脱毛。 这"}, {"lane": "graph", "article_key": "f61f65dec2d8e3ad753eb16613ea37ec5d5c93b7", "account_slug": "01-yinghe-aesthetics", "title"   <script>
    const data = JSON.parse(document.getElementById('data').textContent);
    const state = { q: '', type: 'all', route: 'all', ext: 'all' };
    const stats = document.getElementById('stats');
    const cardsEl = document.getElementById('cards');
    const qInput = document.getElementById('q');
    const typeSel = document.getElementById('type');
    const routeSel = document.getElementById('route');
    const predicateSel = document.getElementById('predicate');
    const authoritySel = document.getElementById('authority');
    let view = 'cards';
    let relationRisk = 'all';

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function init() {
      stats.innerHTML = Object.entries(data.counts).map(([k,v]) => `<div class="stat"><b>${v}</b><span>${esc(k)}</span></div>`).join('');
      const types = [...new Set(data.cards.map(c => c.question_type))].sort();
      const routes = [...new Set(data.cards.map(c => c.recommended_route))].sort();
      const predicates = Object.keys(data.predicate_counts).sort();
      const authorities = Object.keys(data.authority_counts).sort();
      typeSel.innerHTML = '<option value="all">\u5168\u90e8\u7c7b\u578b</option>' + types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      routeSel.innerHTML = '<option value="all">\u5168\u90e8\u8def\u7ebf</option>' + routes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      predicateSel.innerHTML = '<option value="all">All predicates</option>' + predicates.map(t => `<option value="${esc(t)}">${esc(t)} (${data.predicate_counts[t]})</option>`).join('');
      authoritySel.innerHTML = '<option value="all">All authorities</option>' + authorities.map(t => `<option value="${esc(t)}">${esc(t)} (${data.authority_counts[t]})</option>`).join('');
      qInput.addEventListener('input', e => { state.q = e.target.value.trim().toLowerCase(); renderCards(); });
      typeSel.addEventListener('change', e => { state.type = e.target.value; renderCards(); });
      routeSel.addEventListener('change', e => { state.route = e.target.value; renderCards(); });
      predicateSel.addEventListener('change', e => { renderCards(); });
      authoritySel.addEventListener('change', e => { renderCards(); });
      document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.ext = btn.dataset.ext;
        renderCards();
      }));
      document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        view = btn.dataset.view;
        renderCards();
      }));
      document.querySelectorAll('[data-risk]').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('[data-risk]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        relationRisk = btn.dataset.risk;
        renderCards();
      }));
      renderCards();
    }

    function match(card) {
      if (state.type !== 'all' && card.question_type !== state.type) return false;
      if (state.route !== 'all' && card.recommended_route !== state.route) return false;
      if (state.ext === 'yes' && !card.external_sources.length) return false;
      if (state.ext === 'no' && card.external_sources.length) return false;
      if (!state.q) return true;
      const hay = JSON.stringify(card).toLowerCase();
      return hay.includes(state.q);
    }

    function renderCards() {
      if (view === 'relations') return renderRelations();
      if (view === 'sources') return renderSources();
      const rows = data.cards.filter(match);
      if (!rows.length) {
        cardsEl.innerHTML = '<div class="panel empty">\u6ca1\u6709\u5339\u914d\u7ed3\u679c</div>';
        return;
      }
      cardsEl.innerHTML = rows.map(card => `
        <article class="card">
          <h2>${esc(card.question_id)} · ${esc(card.question)}</h2>
          <div class="meta">
            <span class="badge">${esc(card.question_type)}</span>
            <span class="badge route">${esc(card.recommended_route)}</span>
            <span class="badge">${esc(card.confidence)}</span>
            ${card.external_sources.length ? '<span class="badge risk">\u5916\u90e8\u590d\u6838</span>' : ''}
          </div>
          <div class="skeleton">${esc(card.answer_skeleton)}</div>
          <div class="grid">
            <section>
              <h3>\u5185\u90e8\u5f15\u7528</h3>
              <ul>
                ${card.internal_citations.slice(0,6).map(c => `<li><b>${esc(c.lane)}</b> · ${esc(c.title)}<br><span class="quote">${esc(c.quote_or_snippet)}</span><br><a href="${esc(c.source_url || '#')}" target="_blank">${esc(c.article_key)}</a></li>`).join('')}
              </ul>
            </section>
            <section>
              <h3>\u5916\u90e8\u6765\u6e90 / Caveat</h3>
              <ul>
                ${card.caveats.map(c => `<li>${esc(c)}</li>`).join('')}
                ${card.external_sources.map(s => `<li><a href="${esc(s.url)}" target="_blank">${esc(s.publisher)} · ${esc(s.title)}</a><br><span class="quote">${esc(s.evidence_summary)}</span></li>`).join('')}
              </ul>
            </section>
          </div>
        </article>
      `).join('');
    }
    function relationMatch(r) {
      if (!state.q) return true;
      return JSON.stringify(r).toLowerCase().includes(state.q);
    }
    function renderRelations() {
      const pred = predicateSel.value;
      const rows = data.relations_sample.filter(r => (pred === 'all' || r.predicate === pred) && (relationRisk === 'all' || r.risk_sensitive) && relationMatch(r)).slice(0, 200);
      if (!rows.length) {
        cardsEl.innerHTML = '<div class="panel empty">No relation matches</div>';
        return;
      }
      cardsEl.innerHTML = `<div class="card"><h2>Relation Candidates Sample</h2><p class="sub">Showing ${rows.length} rows from ${data.relations_sample.length} embedded samples. Full relation table remains in SQLite/JSONL.</p><table><thead><tr><th>Subject</th><th>Predicate</th><th>Object</th><th>Article</th><th>Quote</th></tr></thead><tbody>${rows.map(r => `<tr><td>${esc(r.subject)}</td><td>${esc(r.predicate)}${r.risk_sensitive ? '<br><span class="badge risk">risk</span>' : ''}</td><td>${esc(r.object)}</td><td>${esc(r.title)}<br><span class="quote">${esc(r.article_key)}</span></td><td class="quote">${esc(r.quote)}</td></tr>`).join('')}</tbody></table></div>`;
    }
    function renderSources() {
      const authority = authoritySel.value;
      const rows = data.external_sources.filter(s => (authority === 'all' || s.authority_type === authority) && (!state.q || JSON.stringify(s).toLowerCase().includes(state.q)));
      cardsEl.innerHTML = rows.map(s => `<article class="card"><h2>${esc(s.publisher)} · ${esc(s.title)}</h2><div class="meta"><span class="badge route">${esc(s.authority_type)}</span></div><p>${esc(s.evidence_summary)}</p><p class="quote">${esc(s.verification_use)}</p><p><a href="${esc(s.url)}" target="_blank">${esc(s.url)}</a></p></article>`).join('') || '<div class="panel empty">No source matches</div>';
    }
    init();
  </script>
</body>
</html>
