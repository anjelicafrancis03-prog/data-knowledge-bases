  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242a;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #0f766e;
      --accent-soft: #e7f6f3;
      --warn: #b45309;
      --danger: #b42318;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      padding: 22px 0 18px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
      font-weight: 650;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) repeat(3, minmax(170px, 220px));
      gap: 10px;
      padding: 14px 0 18px;
    }
    input, select {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      min-width: 0;
    }
    main {
      padding: 18px 0 30px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
    }
    .stat .value {
      font-size: 24px;
      font-weight: 650;
      margin-top: 4px;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 14px;
      align-items: start;
    }
    .list, .detail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 620px;
    }
    .list-head, .detail-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .items {
      max-height: 760px;
      overflow: auto;
    }
    .item {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      cursor: pointer;
      color: var(--text);
    }
    .item:hover, .item.active {
      background: var(--accent-soft);
    }
    .item-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .item-sub {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2f7;
      color: #344054;
      font-size: 12px;
      max-width: 100%;
    }
    .pill.accent { background: var(--accent-soft); color: #0f766e; }
    .pill.warn { background: #fff4e5; color: var(--warn); }
    .pill.danger { background: #fee4e2; color: var(--danger); }
    .detail-body {
      padding: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      min-height: 66px;
    }
    .field .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .field .v {
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    h3 {
      margin: 18px 0 8px;
      font-size: 14px;
      color: #344054;
      letter-spacing: 0;
    }
    .text-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfe;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 14px;
    }
    .decision {
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      padding: 12px;
      border-radius: 0 6px 6px 0;
      margin-top: 12px;
    }
    a { color: #0f5f9f; text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 980px) {
      .top, .layout, .toolbar, .stats {

      }
      .wrap {
        width: min(100vw - 24px, 760px);
      }
      .list, .detail {
        min-height: auto;
      }
      .items {
        max-height: 420px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

ft_817c345e7817f5d8", "suggested_reviewer_decision": "confirm_draft", "evidence_strength": "contextual_or_weak", "evidence_score": 2, "review_question": "Should this row be reviewed as risk/compliance context rather than service-conversion gap?", "suggested_reviewer_notes": "Confirm reroute from service-conversion gap to risk/compliance review; do not create a service pattern from this row.", "blocking_risk": "Do not treat anecdotal risk-warning article language as medical advice.", "account_name": "肉毒毒素btxa", "source_url": "http://mp.weixin.qq.com/s?__biz=MzU5NDcwMjM3Mg==&mid=2247576574&idx=2&sn=65be7dbe9658c07ab9bff55416100505&chksm=fe7ed2b5c9095ba31b20ff7ddc5dd483c0316131d843b3053cc2eb6192145c548994de90ab12#rd"}];
    const SUMMARY = {"items": 64, "byRecommendation": {"canonical_pattern_candidate": 30, "not_reusable_gap_keep_contextual": 3, "reroute_to_risk_context": 1, "risk_pattern_candidate_needs_human_check": 30}, "byDraftDecision": {"approve_pattern_link_keep_original": 30, "needs_human_qualification_signal_check": 30, "reroute_gap_to_risk_review": 1, "retain_contextual_no_pattern": 3}, "bySecondPass": {"confirm_draft": 34, "needs_more_evidence": 30}, "byConcept": {"postcare_recovery_context": 2, "procedure_context": 30, "risk_compliance_context": 30, "service_conversion_context": 2}, "byStatus": {"pending_review": 64}};
    const state = { rows: DATA, filtered: DATA, selected: null };

    const labels = {
      canonical_pattern_candidate: "可建 canonical pattern",
      risk_pattern_candidate_needs_human_check: "风险模式需人工核",
      not_reusable_gap_keep_contextual: "保留上下文",
      reroute_to_risk_context: "转入风险复核",
      p0_dedupe_sample: "P0 去重抽样",
      small_gap_evidence_review: "小批 gap 复核"
    };

    function label(value) { return labels[value] || value || "未标注"; }
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }
    function short(value, n=120) {
      const text = String(value ?? "");
      return text.length > n ? text.slice(0, n - 1) + "…" : text;
    }
    function uniq(key) {
      return [...new Set(DATA.map(row => row[key]).filter(Boolean))].sort();
    }
    function fillSelect(id, key, allLabel) {
      const el = document.getElementById(id);
      el.innerHTML = `<option value="">${allLabel}</option>` + uniq(key).map(v => `<option value="${esc(v)}">${esc(label(v))}</option>`).join("");
    }
    function renderStats() {
      const cards = [
        ["复核项", SUMMARY.items],
        ["仍待复核", SUMMARY.byStatus.pending_review || 0],
        ["可建模式", SUMMARY.byRecommendation.canonical_pattern_candidate || 0],
        ["二轮建议", Object.values(SUMMARY.bySecondPass || {}).reduce((a, b) => a + b, 0)]
      ];
      document.getElementById("stats").innerHTML = cards.map(([k, v]) => `<div class="stat"><div class="label">${esc(k)}</div><div class="value">${esc(v)}</div></div>`).join("");
    }
    function applyFilters() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const rec = document.getElementById("recommendation").value;
      const concept = document.getElementById("concept").value;
      const kind = document.getElementById("kind").value;
      state.filtered = DATA.filter(row => {
        if (rec && row.recommendation_code !== rec) return false;
        if (concept && row.concept_key !== concept) return false;
        if (kind && row.item_kind !== kind) return false;
        if (!q) return true;
        return [row.source_title, row.key_point_text, row.evidence_excerpt, row.rationale, row.proposed_reviewer_decision]
          .some(value => String(value || "").toLowerCase().includes(q));
      });
      if (!state.filtered.includes(state.selected)) state.selected = state.filtered[0] || null;
      renderList();
      renderDetail();
    }
    function pill(text, cls="") {
      return `<span class="pill ${cls}">${esc(text)}</span>`;
    }
    function renderList() {
      document.getElementById("visibleCount").textContent = `${state.filtered.length} / ${DATA.length}`;
      document.getElementById("items").innerHTML = state.filtered.map(row => {
        const active = state.selected && row.item_id === state.selected.item_id ? " active" : "";
        const recClass = row.recommendation_code === "reroute_to_risk_context" ? "danger" : row.recommendation_code.includes("risk") ? "warn" : "accent";
        return `<button class="item${active}" data-id="${esc(row.item_id)}">
          <div class="item-title">${esc(short(row.source_title, 78))}</div>
          <div class="item-sub">
            ${pill(label(row.item_kind))}
            ${pill(label(row.recommendation_code), recClass)}
            ${pill(row.concept_key)}
          </div>
        </button>`;
      }).join("");
      document.querySelectorAll(".item").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = DATA.find(row => row.item_id === btn.dataset.id);
          renderList();
          renderDetail();
        });
      });
    }
    function field(k, v) {
      return `<div class="field"><div class="k">${esc(k)}</div><div class="v">${esc(v || "")}</div></div>`;
    }
    function renderDetail() {
      const row = state.selected;
      if (!row) {
        document.getElementById("detailTitle").textContent = "没有匹配项";
        document.getElementById("detailStatus").textContent = "";
        document.getElementById("detailBody").innerHTML = "";
        return;
      }
      document.getElementById("detailTitle").textContent = row.source_title || "未命名文章";
      document.getElementById("detailStatus").textContent = row.review_status || "";
      const link = row.source_url ? `<a href="${esc(row.source_url)}" target="_blank" rel="noreferrer">打开原文链接</a>` : "无链接";
      document.getElementById("detailBody").innerHTML = `
        <div class="grid">
          ${field("机器建议", label(row.recommendation_code))}
          ${field("建议复核决策", row.proposed_reviewer_decision)}
          ${field("建议模式键", row.proposed_pattern_key || "")}
          ${field("草案决策", row.draft_decision_code || "")}
          ${field("草案范围", row.draft_action_scope || "")}
          ${field("二轮建议", row.suggested_reviewer_decision || "")}
          ${field("证据强度", `${row.evidence_strength || ""} / ${row.evidence_score ?? ""}`)}
          ${field("允许更新源数据", String(row.source_update_allowed ?? ""))}
          ${field("概念", row.concept_key)}
          ${field("重复命中", row.exact_duplicate_count)}
          ${field("覆盖文章 / 账号", `${row.matched_article_count} / ${row.matched_account_count}`)}
          ${field("Key point 类型", row.key_point_type)}
          ${field("当前抽取状态", row.current_key_point_review_status)}
          ${field("账号 / 链接", `${row.account_name || ""} · ${link}`)}
        </div>
        <h3>Key Point</h3>
        <div class="text-box">${esc(row.key_point_text)}</div>
        <h3>证据摘录</h3>
        <div class="text-box">${esc(row.evidence_excerpt)}</div>
        <div class="decision">
          <strong>机器辅助理由</strong>
          <div>${esc(row.rationale)}</div>
        </div>
        <div class="decision">
          <strong>决策草案</strong>
          <div>${esc(row.draft_rationale || "暂无草案")}</div>
        </div>
        <div class="decision">
          <strong>第二轮复核建议</strong>
          <div><b>核查问题：</b>${esc(row.review_question || "")}</div>
          <div><b>建议填表：</b>${esc(row.suggested_reviewer_decision || "")}</div>
          <div><b>建议备注：</b>${esc(row.suggested_reviewer_notes || "")}</div>
          <div><b>边界：</b>${esc(row.blocking_risk || "")}</div>
        </div>
        <h3>ID</h3>
        <div class="text-box">draft_id=${esc(row.draft_id || "")}<br>item_id=${esc(row.item_id)}<br>key_point_id=${esc(row.key_point_id)}<br>article_id=${esc(row.article_id)}</div>
      `;
    }
    fillSelect("recommendation", "recommendation_code", "全部机器建议");
    fillSelect("concept", "concept_key", "全部概念");
    fillSelect("kind", "item_kind", "全部类型");
    renderStats();
    ["search", "recommendation", "concept", "kind"].forEach(id => document.getElementById(id).addEventListener("input", applyFilters));
    state.selected = DATA[0] || null;
    applyFilters();
  </script>
