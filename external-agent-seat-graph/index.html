<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>External Agent Seat Graph</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d7dce5;
      --ok: #1b7f5f;
      --warn: #9a6700;
      --block: #b42318;
      --blue: #265fbe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 24px 32px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    main {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 20px;
      padding: 20px 32px 32px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    h2 { margin: 0 0 12px; font-size: 16px; letter-spacing: 0; }
    .meta {
      display: grid;
      gap: 10px;
      font-size: 13px;
    }
    .meta code, .path {
      display: block;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-family: Consolas, monospace;
      font-size: 12px;
    }
    .graph {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }
    .node {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 132px;
      background: #fff;
    }
    .node h3 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
    }
    .passed, .written { color: var(--ok); }
    .warning { color: var(--warn); }
    .blocked { color: var(--block); }
    .planned { color: var(--blue); }
    .summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 10px;
    }
    a {
      color: var(--blue);
      text-decoration: none;
      overflow-wrap: anywhere;
      font-size: 12px;
    }
    .edges {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      header { padding: 20px 16px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>External Agent Seat Graph</h1>
    <p>只读投影。Harness 文件仍是事实源；此页面不包含执行按钮，也不授予任何外部席位权限。</p>
  </header>
  <main>
    <section>
      <h2>边界</h2>
      <div class="meta">
        <div><strong>Mode</strong><code>read-only</code></div>
        <div><strong>Runtime enforcement</strong><code>false</code></div>
        <div><strong>L2 / L3</strong><code>blocked</code></div>
        <div><strong>Canonical graph</strong><code>F:\codex\reports\kanwas-sit-side-by-side\2026-06-13\external-agent-seat-graph.projection.json</code></div>
      </div>
    </section>
    <section>
      <h2>节点</h2>
      <div id="graph" class="graph"></div>
    </section>
    <section>
      <h2>关系</h2>
      <div id="edges" class="edges"></div>
    </section>
  </main>
  <script type="application/json" id="graph-data">
  {
    "nodes": [
      {"id":"manifest","label":"Run Manifest","status":"written","sourcePath":"F:\\codex\\reports\\run-manifests\\2026-06-13-kanwas-sit-side-by-side","summary":"Canonical run directory."},
      {"id":"evidence-index","label":"Evidence Index","status":"written","sourcePath":"F:\\codex\\reports\\run-manifests\\2026-06-13-kanwas-sit-side-by-side\\evidence-index.md","summary":"Authoritative evidence list."},
      {"id":"checkpoint","label":"Rolling Checkpoint","status":"written","sourcePath":"F:\\codex\\reports\\active-handoffs\\kanwas-sit-side-by-side-20260613.md","summary":"Recovery state and next allowed actions."},
      {"id":"packet-validator","label":"Packet Validator","status":"passed","sourcePath":"F:\\codex\\tools\\harness_protocol\\validate-external-agent-packet.ps1","summary":"Declarative L1 packet validation."},
      {"id":"dispatch-spec","label":"Dispatch Log Spec","status":"written","sourcePath":"F:\\codex\\docs\\harness-protocol\\external-agent-dispatch-log-v0.1.md","summary":"Manual dispatch evidence contract."},
      {"id":"o1-o3-synthesis","label":"O1/O3 Synthesis","status":"passed","sourcePath":"F:\\codex\\reports\\kanwas-sit-side-by-side\\2026-06-13\\o1-o3-review-synthesis-external-agent-seats-three-knife-plan-20260613.md","summary":"Proceed through gates; keep L2/L3 blocked."},
      {"id":"claude-code-review","label":"Generic Claude Code Review","status":"warning","sourcePath":"F:\\codex\\reports\\kanwas-sit-side-by-side\\2026-06-13\\claude-code-generic-review-external-agent-seats-l1-20260613.md","summary":"Compact L1 pilot succeeded; rich payload transport is still blocked."},
      {"id":"transport-blocker","label":"L1 Payload Transport Blocker","status":"blocked","sourcePath":"F:\\codex\\reports\\kanwas-sit-side-by-side\\2026-06-13\\claude-code-generic-review-external-agent-seats-l1-20260613.md","summary":"Replace argv payload with reliable file or stdin transport before richer L1 dispatch."}
    ],
    "edges": [
      {"from":"manifest","to":"evidence-index","type":"links"},
      {"from":"evidence-index","to":"checkpoint","type":"links"},
      {"from":"packet-validator","to":"claude-code-review","type":"validates"},
      {"from":"dispatch-spec","to":"o1-o3-synthesis","type":"records"},
      {"from":"claude-code-review","to":"transport-blocker","type":"blocks"},
      {"from":"evidence-index","to":"transport-blocker","type":"links"}
    ]
  }
  </script>
  <script>
    const data = JSON.parse(document.getElementById("graph-data").textContent);
    const graph = document.getElementById("graph");
    const edges = document.getElementById("edges");
    for (const node of data.nodes) {
      const div = document.createElement("article");
      div.className = "node";
      div.innerHTML = `<span class="badge ${node.status}">${node.status}</span><h3>${node.label}</h3><div class="summary">${node.summary}</div><div class="path">${node.sourcePath}</div>`;
      graph.appendChild(div);
    }
    for (const edge of data.edges) {
      const div = document.createElement("div");
      div.textContent = `${edge.from} -> ${edge.to} (${edge.type})`;
      edges.appendChild(div);
    }
  </script>
</body>
</html>
