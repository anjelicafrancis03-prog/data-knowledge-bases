<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆承载关系图谱</title>
  <style>
    :root {
      --bg:#f7f8fb; --panel:#fff; --panel-soft:#f2f5f8; --line:#d7dee8;
      --text:#1f2937; --muted:#687385; --accent:#0f766e; --blue:#2563eb;
      --warn:#b45309; --weak:#9a3412; --ocr:#7c3aed; --ok:#047857;
      font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
    header { padding:14px 18px; background:var(--panel); border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    h1 { margin:0; font-size:20px; letter-spacing:0; }
    a { color:var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .sub { color:var(--muted); font-size:12px; margin-top:4px; }
    .stats { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; max-width:760px; }
    .stat { border:1px solid var(--line); border-radius:6px; background:var(--panel-soft); padding:6px 9px; min-width:76px; text-align:right; }
    .stat strong { display:block; font-size:17px; line-height:1.1; }
    .stat span { color:var(--muted); font-size:11px; }
    .toolbar { padding:12px 18px; display:grid; grid-template-columns:minmax(200px,1fr) 170px 130px 110px auto; gap:10px; background:var(--panel); border-bottom:1px solid var(--line); align-items:center; }
    input, select, button { min-height:36px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--text); padding:8px 10px; font:inherit; min-width:0; }
    button { cursor:pointer; }
    main { padding:14px 18px; display:grid; grid-template-columns:minmax(540px,1fr) 390px; gap:12px; height:calc(100vh - 126px); min-height:560px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; min-height:0; }
    .graph-wrap { position:relative; }
    svg { display:block; width:100%; height:100%; min-height:540px; background:#fbfcfe; }
    .edge { cursor:pointer; stroke-linecap:round; opacity:.78; }
    .edge.active { opacity:1; stroke:#111827; }
    .node { cursor:pointer; }
    .node circle { fill:#fff; stroke:var(--accent); stroke-width:2; }
    .node text { font-size:13px; fill:var(--text); paint-order:stroke; stroke:#fff; stroke-width:4px; stroke-linejoin:round; }
    .legend { position:absolute; left:12px; top:12px; display:flex; flex-wrap:wrap; gap:6px; max-width:80%; }
    .badge { border:1px solid var(--line); border-radius:999px; padding:2px 7px; background:#fff; white-space:nowrap; font-size:11px; }
    .badge.strong { color:var(--ok); border-color:#a7f3d0; background:#ecfdf5; }
    .badge.medium { color:var(--blue); border-color:#bfdbfe; background:#eff6ff; }
    .badge.ocr { color:var(--ocr); border-color:#ddd6fe; background:#f5f3ff; }
    .badge.edgeweak, .badge.weak { color:var(--weak); border-color:#fed7aa; background:#fff7ed; }
    .side { display:grid; grid-template-rows:auto 1fr; }
    .side-head { padding:12px; border-bottom:1px solid var(--line); background:#fff; }
    .side-body { overflow:auto; padding:12px; }
    h2 { margin:0 0 8px; font-size:17px; letter-spacing:0; }
    h3 { margin:14px 0 8px; font-size:14px; letter-spacing:0; }
    .meta { display:flex; gap:6px; flex-wrap:wrap; color:var(--muted); font-size:12px; }
    .edge-list { display:grid; gap:8px; }
    .edge-card { border:1px solid var(--line); border-radius:6px; padding:9px; cursor:pointer; background:#fff; }
    .edge-card.active { border-color:var(--blue); box-shadow:inset 3px 0 0 var(--blue); background:#f8fbff; }
    .edge-title { font-weight:700; margin-bottom:5px; }
    .evidence { border-top:1px solid var(--line); margin-top:10px; padding-top:10px; }
    .evidence p { margin:0 0 10px; }
    pre { white-space:pre-wrap; word-break:break-word; background:#f6f8fb; border:1px solid var(--line); border-radius:6px; padding:10px; font:12px/1.5 Consolas,"Microsoft YaHei",monospace; max-height:240px; overflow:auto; }
    .empty, .loading { color:var(--muted); text-align:center; padding:28px; }
    @media (max-width:980px) {
      header { display:block; }
      .stats { justify-content:flex-start; margin-top:10px; }
      .toolbar { grid-template-columns:1fr; }
      main { grid-template-columns:1fr; height:auto; }
      svg { min-height:520px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>记忆承载关系图谱</h1>
      <div class="sub">候选关系只读可视化；正式 relations 表不在这里修改。<a href="/index.html">返回证据库</a></div>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <section class="toolbar">
    <input id="query" type="search" placeholder="搜索概念或关系候选 ID">
    <select id="bucket">
      <option value="all">全部候选级别</option>
      <option value="strong_review_candidate">strong_review_candidate</option>
      <option value="medium_review_candidate">medium_review_candidate</option>
      <option value="ocr_review_candidate">ocr_review_candidate</option>
      <option value="edge_weak_review_candidate">edge_weak_review_candidate</option>
      <option value="weak_review_candidate">weak_review_candidate</option>
    </select>
    <input id="min-docs" type="number" min="0" max="1000" value="10" title="最小支持文档数">
    <input id="limit" type="number" min="1" max="300" value="104" title="边数量上限">
    <button id="run">刷新图谱</button>
  </section>
  <main>
    <section class="panel graph-wrap">
      <div class="legend" id="legend"></div>
      <svg id="graph" role="img" aria-label="关系候选图谱"></svg>
    </section>
    <aside class="panel side">
      <div class="side-head">
        <h2 id="side-title">候选关系</h2>
        <div class="meta" id="side-meta"></div>
      </div>
      <div class="side-body" id="side-body"></div>
    </aside>
  </main>
  <script>
    const state = { data:null, selected:null };
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const badgeClass = bucket => bucket?.startsWith("strong") ? "strong" : bucket?.startsWith("medium") ? "medium" : bucket?.startsWith("ocr") ? "ocr" : bucket?.startsWith("edge") ? "edgeweak" : "weak";
    const badge = (text, cls="") => `<span class="badge ${cls}">${esc(text)}</span>`;
    async function fetchJson(url) {
      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return await res.json();
    }
    function renderStats() {
      const s = state.data?.stats || {};
      const items = [
        ["节点", state.data?.nodes?.length],
        ["边", state.data?.edges?.length],
        ["候选", s.relation_candidates],
        ["证据", s.relation_evidence],
        ["正式关系", s.formal_relations],
        ["FK", s.foreign_key_check_rows]
      ];
      $("stats").innerHTML = items.map(([k,v]) => `<div class="stat"><strong>${esc(v ?? "-")}</strong><span>${esc(k)}</span></div>`).join("");
    }
    function renderLegend() {
      $("legend").innerHTML = (state.data?.bucket_counts || []).map(row => badge(`${row.confidence_bucket} ${row.count}`, badgeClass(row.confidence_bucket))).join("");
    }
    function edgeColor(bucket) {
      if (bucket === "strong_review_candidate") return "#047857";
      if (bucket === "medium_review_candidate") return "#2563eb";
      if (bucket === "ocr_review_candidate") return "#7c3aed";
      if (bucket === "edge_weak_review_candidate") return "#9a3412";
      return "#6b7280";
    }
    function layout(nodes, width, height) {
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.max(160, Math.min(width, height) * 0.34);
      return nodes.map((node, idx) => {
        const angle = -Math.PI / 2 + (Math.PI * 2 * idx) / Math.max(1, nodes.length);
        const r = Math.max(16, Math.min(36, 12 + Math.sqrt(node.weight || 1) * 0.8));
        return { ...node, x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius, r };
      });
    }
    function renderGraph() {
      const svg = $("graph");
      const rect = svg.getBoundingClientRect();
      const width = Math.max(640, rect.width || 900);
      const height = Math.max(520, rect.height || 620);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      const positioned = layout(state.data.nodes || [], width, height);
      const byId = new Map(positioned.map(node => [node.id, node]));
      const edges = state.data.edges || [];
      const edgeEls = edges.map(edge => {
        const a = byId.get(edge.concept_a);
        const b = byId.get(edge.concept_b);
        if (!a || !b) return "";
        const active = state.selected === edge.relation_candidate_id ? " active" : "";
        const strokeWidth = Math.max(1.2, Math.min(9, Math.sqrt(edge.support_doc_count || 1) * 0.65));
        return `<line class="edge${active}" data-edge="${esc(edge.relation_candidate_id)}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${edgeColor(edge.confidence_bucket)}" stroke-width="${strokeWidth}">
          <title>${esc(edge.concept_a)} -> ${esc(edge.concept_b)} docs ${esc(edge.support_doc_count)}</title>
        </line>`;
      }).join("");
      const nodeEls = positioned.map(node => {
        return `<g class="node" data-node="${esc(node.id)}" transform="translate(${node.x},${node.y})">
          <circle r="${node.r}"></circle>
          <text text-anchor="middle" dy="4">${esc(node.label)}</text>
          <title>${esc(node.label)} docs ${esc(node.support_docs)} relations ${esc(node.relation_count)}</title>
        </g>`;
      }).join("");
      svg.innerHTML = `<g>${edgeEls}</g><g>${nodeEls}</g>`;
      svg.querySelectorAll("[data-edge]").forEach(el => el.addEventListener("click", () => {
        state.selected = el.getAttribute("data-edge");
        renderGraph();
        renderSide();
      }));
      svg.querySelectorAll("[data-node]").forEach(el => el.addEventListener("click", () => {
        const concept = el.getAttribute("data-node");
        const edge = edges.find(item => item.concept_a === concept || item.concept_b === concept);
        if (edge) state.selected = edge.relation_candidate_id;
        renderGraph();
        renderSide(concept);
      }));
    }
    function selectedEdge() {
      const edges = state.data?.edges || [];
      return edges.find(edge => edge.relation_candidate_id === state.selected) || edges[0];
    }
    function edgeTitle(edge) {
      return `${edge.concept_a} -> ${edge.concept_b}`;
    }
    function edgeMeta(edge) {
      return [
        badge(edge.confidence_bucket, badgeClass(edge.confidence_bucket)),
        badge(`docs ${edge.support_doc_count}`),
        badge(`passages ${edge.support_passage_count}`),
        badge(`max ${edge.max_candidate_score}`),
        badge(`avg ${edge.avg_candidate_score}`)
      ].join("");
    }
    function renderSide(nodeFilter=null) {
      const edges = state.data?.edges || [];
      const edge = selectedEdge();
      if (!edge) {
        $("side-title").textContent = "没有候选关系";
        $("side-meta").innerHTML = "";
        $("side-body").innerHTML = '<div class="empty">没有匹配结果</div>';
        return;
      }
      if (!state.selected) state.selected = edge.relation_candidate_id;
      const focused = selectedEdge();
      $("side-title").textContent = edgeTitle(focused);
      $("side-meta").innerHTML = edgeMeta(focused);
      const list = (nodeFilter ? edges.filter(item => item.concept_a === nodeFilter || item.concept_b === nodeFilter) : edges).slice(0, 40);
      $("side-body").innerHTML = `
        <h3>证据入口</h3>
        <div class="evidence">${(focused.top_evidence || []).map(ev => `<p>${esc(ev.source_title)} ${esc(ev.date)} p${esc(ev.passage_index)} ${badge(`score ${ev.candidate_score}`, "strong")}<br>${esc(ev.excerpt)}</p>`).join("") || "暂无证据片段"}</div>
        <h3>${nodeFilter ? `关联 ${nodeFilter}` : "候选列表"}</h3>
        <div class="edge-list">${list.map(item => `<article class="edge-card ${item.relation_candidate_id === focused.relation_candidate_id ? "active" : ""}" data-card="${esc(item.relation_candidate_id)}">
          <div class="edge-title">${esc(edgeTitle(item))}</div>
          <div class="meta">${edgeMeta(item)}</div>
        </article>`).join("")}</div>
        <h3>Raw JSON</h3>
        <pre>${esc(JSON.stringify(focused, null, 2))}</pre>
      `;
      document.querySelectorAll("[data-card]").forEach(card => card.addEventListener("click", () => {
        state.selected = card.getAttribute("data-card");
        renderGraph();
        renderSide(nodeFilter);
      }));
    }
    async function loadGraph() {
      $("side-body").innerHTML = '<div class="loading">加载图谱中...</div>';
      const url = new URL("/api/graph", location.origin);
      url.searchParams.set("q", $("query").value.trim());
      url.searchParams.set("bucket", $("bucket").value);
      url.searchParams.set("min_docs", $("min-docs").value || "0");
      url.searchParams.set("limit", $("limit").value || "104");
      state.data = await fetchJson(url);
      state.selected = state.data.edges?.[0]?.relation_candidate_id || null;
      renderStats();
      renderLegend();
      renderGraph();
      renderSide();
    }
    $("run").onclick = loadGraph;
    $("query").addEventListener("keydown", event => { if (event.key === "Enter") loadGraph(); });
    window.addEventListener("resize", () => { if (state.data) renderGraph(); });
    loadGraph().catch(err => {
      $("side-body").innerHTML = `<div class="empty">加载失败：${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
