<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆承载图谱复核包</title>
  <style>
    :root {
      --bg:#f7f8fb; --panel:#fff; --soft:#f2f5f8; --line:#d7dee8;
      --text:#1f2937; --muted:#667085; --blue:#2563eb; --green:#047857;
      --amber:#b45309; --red:#b42318; --teal:#0f766e;
      font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-size:14px; line-height:1.55; }
    header { background:var(--panel); border-bottom:1px solid var(--line); padding:14px 18px; display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    h1 { margin:0; font-size:20px; letter-spacing:0; }
    h2 { margin:0 0 10px; font-size:16px; letter-spacing:0; }
    a { color:var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .sub { color:var(--muted); font-size:12px; margin-top:4px; }
    .stats { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; max-width:820px; }
    .stat { background:var(--soft); border:1px solid var(--line); border-radius:6px; min-width:80px; padding:6px 9px; text-align:right; }
    .stat strong { display:block; font-size:17px; line-height:1.1; }
    .stat span { color:var(--muted); font-size:11px; }
    .toolbar { background:var(--panel); border-bottom:1px solid var(--line); padding:12px 18px; display:grid; grid-template-columns:minmax(220px,1fr) 260px 300px 90px 90px auto; gap:10px; align-items:center; }
    input, select, button { min-height:36px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--text); padding:8px 10px; font:inherit; min-width:0; }
    button { cursor:pointer; }
    main { padding:14px 18px; display:grid; grid-template-columns:280px minmax(0,1fr); gap:12px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px; min-width:0; }
    .cards { display:grid; gap:10px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:7px; padding:12px; }
    .title { font-weight:700; font-size:15px; margin-bottom:6px; }
    .meta { display:flex; flex-wrap:wrap; gap:6px; color:var(--muted); font-size:12px; }
    .badge { display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:999px; padding:2px 7px; background:#fff; white-space:nowrap; font-size:11px; max-width:100%; }
    .badge.green { color:var(--green); border-color:#a7f3d0; background:#ecfdf5; }
    .badge.blue { color:var(--blue); border-color:#bfdbfe; background:#eff6ff; }
    .badge.amber { color:var(--amber); border-color:#fed7aa; background:#fff7ed; }
    .badge.red { color:var(--red); border-color:#fecaca; background:#fef2f2; }
    .badge.teal { color:var(--teal); border-color:#99f6e4; background:#f0fdfa; }
    .note { margin-top:7px; color:#344054; }
    .small { color:var(--muted); font-size:12px; }
    .evidence { margin-top:10px; border-top:1px solid var(--line); padding-top:9px; display:grid; gap:8px; }
    .ev { background:var(--soft); border:1px solid var(--line); border-radius:6px; padding:9px; }
    .ev p { margin:5px 0 0; }
    .counts { display:grid; gap:8px; }
    .count { border:1px solid var(--line); border-radius:6px; padding:8px; background:#fff; }
    .bar { height:7px; border-radius:99px; background:#dbeafe; overflow:hidden; margin-top:6px; }
    .bar span { display:block; height:100%; background:var(--teal); }
    .empty, .loading { padding:24px; text-align:center; color:var(--muted); }
    @media (max-width:1000px) {
      header { display:block; }
      .stats { justify-content:flex-start; margin-top:10px; }
      .toolbar, main { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>记忆承载图谱复核包</h1>
      <div class="sub">候选概念对的证据包、风险标记和建议动作。<a href="/insights.html">看洞察</a> · <a href="/graph.html">看图谱</a> · <a href="/index.html">看证据库</a></div>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <section class="toolbar">
    <input id="query" type="search" placeholder="搜索概念、关系、风险、packet/candidate ID">
    <select id="tier">
      <option value="all">全部复核层级</option>
      <option value="tier_1_promote_review_packet">tier_1_promote_review_packet</option>
      <option value="tier_2_semantic_review_packet">tier_2_semantic_review_packet</option>
      <option value="tier_3_navigation_packet">tier_3_navigation_packet</option>
      <option value="tier_3_general_review_packet">tier_3_general_review_packet</option>
      <option value="tier_4_ocr_review_packet">tier_4_ocr_review_packet</option>
      <option value="tier_5_deprioritize_or_drop_packet">tier_5_deprioritize_or_drop_packet</option>
    </select>
    <select id="action">
      <option value="all">全部建议动作</option>
      <option value="llm_or_human_review_for_possible_formal_relation">possible formal relation</option>
      <option value="review_semantic_label_before_use">review semantic label</option>
      <option value="use_for_navigation_or_retrieval_weighting">navigation/retrieval</option>
      <option value="manual_review_before_high_impact_use">manual review</option>
      <option value="verify_ocr_text_before_claim_use">OCR review</option>
      <option value="keep_as_recall_hint_or_drop_from_final_claims">recall/drop</option>
    </select>
    <input id="limit" type="number" min="1" max="100" value="30">
    <input id="offset" type="number" min="0" value="0">
    <button id="run">刷新</button>
  </section>
  <main>
    <aside class="panel">
      <h2>分布</h2>
      <div class="counts" id="counts"></div>
    </aside>
    <section class="panel">
      <h2>复核包</h2>
      <div class="cards" id="packets"></div>
    </section>
  </main>
  <script>
    const $ = id => document.getElementById(id);
    const state = { data:null };
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const badge = (text, cls="") => `<span class="badge ${cls}">${esc(text)}</span>`;
    const clsForTier = tier => tier.includes("tier_1") ? "green" : tier.includes("tier_4") ? "amber" : tier.includes("tier_5") ? "red" : "blue";
    const clsForFlag = flag => flag.includes("ocr") ? "amber" : flag.includes("weak") || flag.includes("thin") ? "red" : flag.includes("broad") ? "blue" : "teal";
    async function fetchJson(url) {
      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return await res.json();
    }
    function renderStats() {
      const run = state.data.run || {};
      const result = state.data.result || {};
      const s = state.data.stats || {};
      const items = [
        ["包", run.packet_count],
        ["证据", run.evidence_count],
        ["当前", result.items?.length || 0],
        ["总匹配", result.total],
        ["正式关系", s.formal_relations],
        ["FK", s.foreign_key_check_rows]
      ];
      $("stats").innerHTML = items.map(([k,v]) => `<div class="stat"><strong>${esc(v ?? "-")}</strong><span>${esc(k)}</span></div>`).join("");
    }
    function renderCounts() {
      const tiers = state.data.tier_counts || [];
      const actions = state.data.action_counts || [];
      const max = Math.max(...tiers.map(x => x.count), ...actions.map(x => x.count), 1);
      $("counts").innerHTML = `
        <div class="small">复核层级</div>
        ${tiers.map(x => `<div class="count"><div>${badge(x.packet_tier, clsForTier(x.packet_tier))} ${esc(x.count)}</div><div class="bar"><span style="width:${Math.max(3, x.count / max * 100)}%"></span></div></div>`).join("")}
        <div class="small" style="margin-top:10px">建议动作</div>
        ${actions.map(x => `<div class="count"><div>${badge(x.recommended_action, "teal")} ${esc(x.count)}</div><div class="bar"><span style="width:${Math.max(3, x.count / max * 100)}%"></span></div></div>`).join("")}
      `;
    }
    function renderPackets() {
      const items = state.data.result?.items || [];
      $("packets").innerHTML = items.map(p => {
        const risks = (p.risk_flags || []).map(f => badge(f, clsForFlag(f))).join("");
        const diversity = p.source_diversity || {};
        const span = p.temporal_span || {};
        const titles = (p.sample_titles || []).slice(0,4).map(t => badge(`${t.source_title} ${t.n || ""}`)).join("");
        const evidence = (p.evidence || []).map(e => `
          <div class="ev">
            <div class="meta">${badge(`#${e.evidence_rank}`, "blue")}${badge(e.evidence_role, "teal")}${badge(`score ${e.candidate_score}`, "green")}${badge(e.date || "undated", e.date ? "" : "amber")}</div>
            <div class="small">${esc(e.source_title)} · p${esc(e.passage_index)} · ${esc(e.doc_id)}</div>
            <p>${esc(e.evidence_excerpt)}</p>
          </div>
        `).join("");
        return `
          <article class="card">
            <div class="title">${esc(p.concept_a)} -> ${esc(p.concept_b)}</div>
            <div class="meta">
              ${badge(p.packet_tier, clsForTier(p.packet_tier))}
              ${badge(p.recommended_action, "teal")}
              ${badge(p.review_priority, "blue")}
              ${badge(p.confidence_bucket)}
              ${badge(`docs ${p.support_doc_count}`, "green")}
              ${badge(`passages ${p.support_passage_count}`)}
              ${badge(p.relation_label)}
            </div>
            <div class="note">${esc(p.reviewer_prompt)}</div>
            <div class="note"><strong>边界：</strong>${esc(p.caveat)}</div>
            <div class="meta" style="margin-top:8px">${risks || badge("no risk flag", "green")}</div>
            <div class="small" style="margin-top:8px">证据覆盖：样本 ${esc(diversity.sample_evidence_count)} / 总 ${esc(diversity.total_evidence_count)}，不同文档 ${esc(diversity.distinct_doc_count)}，时间 ${esc(span.min_date)} - ${esc(span.max_date)}，未定日期 ${esc(span.undated_evidence)}</div>
            <div class="meta" style="margin-top:8px">${titles}</div>
            <div class="small" style="margin-top:8px">packet: ${esc(p.packet_id)} · candidate: <a href="/graph.html?q=${encodeURIComponent(p.relation_candidate_id)}">${esc(p.relation_candidate_id)}</a></div>
            <div class="evidence">${evidence}</div>
          </article>
        `;
      }).join("") || '<div class="empty">没有匹配复核包</div>';
    }
    async function load() {
      $("packets").innerHTML = '<div class="loading">加载中...</div>';
      const url = new URL("/api/pair-review-packets", location.origin);
      url.searchParams.set("q", $("query").value.trim());
      url.searchParams.set("tier", $("tier").value);
      url.searchParams.set("action", $("action").value);
      url.searchParams.set("limit", $("limit").value || "30");
      url.searchParams.set("offset", $("offset").value || "0");
      state.data = await fetchJson(url);
      renderStats();
      renderCounts();
      renderPackets();
    }
    $("run").onclick = load;
    $("query").addEventListener("keydown", event => { if (event.key === "Enter") load(); });
    load().catch(err => {
      $("packets").innerHTML = `<div class="empty">加载失败：${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
