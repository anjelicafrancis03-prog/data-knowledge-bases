 .................................................................32 / 字越少，事越大 22/3/9 ............................................................................................................................................................44 / 中概互联网，财富本质，时间奥秘，风险感知，次数理论，热战能源战金融战 22/3/16 .............................................52 / 你看不懂人心，会什么都是白会 22/4/1 ............................................................................................................................... 60 / 与其每天聊上海，还不如让一部分读者先成就自己 22/4/5 ............................................................................................... 68 | 谁能给我的孩子一个出路？ 25/1/16 ................................................................................................................................. 1611 / 过年的四个重磅话题，家家都不想面对 25/1/31 .......................................................", "finding": "Local corpus contains an opium-war historical analogy and separate internet/network mentions, but not a supported claim that the Qing anti-opium campaign had internet.", "source_kind": "local_markdown", "source_ref": "mc_doc_1f92cfc6507b", "source_title": "记忆承载", "status": "local_evidence_context"}, "concept_path": []}, {"context_pack_id": "ctxpackv2_ea27bb7691a51d23", "question_id": "mc_fact_check_network_during_antidrug_20260609", "item_rank": 16, "item_type": "top_passage", "item_subtype": null, "source_table": "query_evidence_packs_v2.top_passages_json", "source_ref_id": null, "passage_id": null, "doc_id": null, "source_title": "司马南为什么被禁言？", "date": null, "passage_index": null, "score": null, "relation_text": null, "concept_path_json": null, "excerpt": "--- / doc_id: \"mc_doc_edf7f3d7e610\" / source_title: \"司马南为什么被禁言？\" / date: \"2022-08-21\" / year: \"2022\" | file_size: \"167592\" / pages: \"10\" / canonical_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\22 年全部付费文\\\\22-8-21司马南为什么被禁言？.pdf\" / canonical_copy_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\22 年全部付费文\\\\22-8-21司马南为什么被禁言？.pdf\" / text_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\_knowledge_base\\\\text\\\\mc_doc_edf7f3d7e610.txt\"", "metadata": {"audit_item_id": "pauditv2_6ec021b79cc91611", "audit_type": "local_corpus_fact_context", "date_value": "2022-08-21", "evidence_excerpt": "--- / doc_id: \"mc_doc_edf7f3d7e610\" / source_title: \"司马南为什么被禁言？\" / date: \"2022-08-21\" / year: \"2022\" | file_size: \"167592\" / pages: \"10\" / canonical_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\22 年全部付费文\\\\22-8-21司马南为什么被禁言？.pdf\" / canonical_copy_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\22 年全部付费文\\\\22-8-21司马南为什么被禁言？.pdf\" / text_path: \"D:\\\\新建文件夹\\\\记忆承载21-26付费文\\\\_knowledge_base\\\\text\\\\mc_doc_edf7f3d7e610.txt\"", "finding": "Local article title is about being silenced/banned from speech in 2022, not anti-drug history; this is internet-era but a different claim.", "source_kind": "local_markdown", "source_ref": "mc_doc_edf7f3d7e610", "source_title": "司马南为什么被禁言？", "status": "local_evidence_context"}, "concept_path": []}], "stats": {"packs_by_status": [{"pack_status": "ready_context_pack", "count": 4}, {"pack_status": "ready_with_multihop_context", "count": 2}], "items_by_type": [{"item_type": "baseline_citation", "count": 40}, {"item_type": "final_insert_proposal", "count": 1}, {"item_type": "multihop_staging", "count": 5}, {"item_type": "relation_candidate", "count": 3}, {"item_type": "top_claim_candidate", "count": 36}, {"item_type": "top_passage", "count": 27}], "relations": 99, "foreign_key_check": []}};
    const state = {
      packId: DATA.packs[0]?.context_pack_id || null,
      itemId: null,
      packSearch: "",
      itemSearch: "",
      typeFilter: "all",
      mode: "all"
    };

    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const parseMaybe = (value, fallback) => {
      if (!value) return fallback;
      if (Array.isArray(value)) return value;
      try { return JSON.parse(value); } catch { return fallback; }
    };
    const textOf = (obj) => JSON.stringify(obj ?? "").toLowerCase();
    const activePack = () => DATA.packs.find(p => p.context_pack_id === state.packId) || DATA.packs[0];
    const allItemsForPack = () => DATA.items.filter(i => i.context_pack_id === activePack()?.context_pack_id);
    const itemMode = (item) => {
      if (item.item_type === "baseline_citation" || item.item_type === "top_claim_candidate" || item.item_type === "top_passage") return "citation";
      if (item.item_type === "relation_candidate" || item.item_type === "multihop_staging" || item.item_type === "final_insert_proposal") return "graph";
      return "other";
    };
    const statusBadge = (status) => status === "ready_with_multihop_context"
      ? '<span class="badge graph">多跳增强</span>'
      : '<span class="badge ok">可用</span>';

    function renderStats() {
      const stats = [
        ["Packs", DATA.packs.length],
        ["Items", DATA.items.length],
        ["Relations", DATA.stats.relations],
        ["FK Errors", DATA.stats.foreign_key_check.length]
      ];
      $("topStats").innerHTML = stats.map(([label, value]) => `
        <div class="stat"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>
      `).join("");
    }

    function renderPackList() {
      const q = state.packSearch.trim().toLowerCase();
      const packs = DATA.packs.filter(pack => !q || textOf(pack).includes(q));
      $("packList").innerHTML = packs.map(pack => `
        <button class="pack-button ${pack.context_pack_id === state.packId ? "active" : ""}" data-pack="${esc(pack.context_pack_id)}">
          <div class="pack-title">${esc(pack.question)}</div>
          <div class="pack-meta">
            ${statusBadge(pack.pack_status)}
            <span class="badge">${esc(pack.target_capability)}</span>
            <span class="badge">${esc(pack.item_count)} items</span>
          </div>
        </button>
      `).join("") || '<div class="empty">没有匹配的问题</div>';
      document.querySelectorAll("[data-pack]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.packId = btn.dataset.pack;
          state.itemId = null;
          render();
        });
      });
    }

    function renderTypeFilter() {
      const types = Array.from(new Set(allItemsForPack().map(item => item.item_type))).sort();
      $("typeFilter").innerHTML = ['<option value="all">全部类型</option>']
        .concat(types.map(type => `<option value="${esc(type)}">${esc(type)}</option>`)).join("");
      $("typeFilter").value = state.typeFilter;
    }

    function filteredItems() {
      const q = state.itemSearch.trim().toLowerCase();
      return allItemsForPack().filter(item => {
        if (state.typeFilter !== "all" && item.item_type !== state.typeFilter) return false;
        if (state.mode !== "all" && itemMode(item) !== state.mode) return false;
        return !q || textOf(item).includes(q);
      });
    }

    function renderSummary() {
      const pack = activePack();
      if (!pack) {
        $("packSummary").innerHTML = '<div class="empty">没有 context pack</div>';
        return;
      }
      const caveats = pack.caveats || [];
      $("packSummary").innerHTML = `
        <h2>${esc(pack.question)}</h2>
        <p><strong>${esc(pack.question_id)}</strong> · ${esc(pack.target_capability)} · ${statusBadge(pack.pack_status)}</p>
        <div class="concepts">
          ${(pack.concept_labels || []).map(c => `<span class="badge">${esc(c)}</span>`).join("")}
          ${(pack.concept_tokens || []).map(c => `<span class="badge graph">${esc(c)}</span>`).join("")}
        </div>
        <div class="pack-meta" style="margin-top:10px;">
          <span class="badge">${esc(pack.item_count)} items</span>
          <span class="badge">${esc(pack.citation_item_count)} citations</span>
          <span class="badge">${esc(pack.relation_item_count)} relations</span>
          <span class="badge">${esc(pack.multihop_item_count)} multihop</span>
          <span class="badge">${esc(pack.direct_proposal_item_count)} proposals</span>
        </div>
        <div class="caveats">
          ${caveats.map(c => `<div>· ${esc(c)}</div>`).join("")}
          <div style="margin-top:6px;">Markdown: <code>${esc(pack.pack_markdown_path)}</code></div>
        </div>
      `;
    }

    function renderItems() {
      const items = filteredItems();
      if (!state.itemId || !items.some(i => `${i.question_id}:${i.item_rank}` === state.itemId)) {
        state.itemId = items[0] ? `${items[0].question_id}:${items[0].item_rank}` : null;
      }
      $("itemList").innerHTML = items.map(item => {
        const id = `${item.question_id}:${item.item_rank}`;
        const title = item.source_title || item.relation_text || item.source_ref_id || item.item_type;
        return `
          <article class="item ${id === state.itemId ? "active" : ""}" data-item="${esc(id)}">
            <div class="item-title">I${esc(item.item_rank)} · ${esc(title)}</div>
            <div class="item-meta">
              <span class="badge ${itemMode(item) === "graph" ? "graph" : ""}">${esc(item.item_type)}</span>
              ${item.item_subtype ? `<span class="badge">${esc(item.item_subtype)}</span>` : ""}
              ${item.date ? `<span class="badge">${esc(item.date)}</span>` : ""}
              ${item.score !== null && item.score !== undefined ? `<span class="badge">score ${esc(item.score)}</span>` : ""}
            </div>
            <div class="excerpt">${esc(item.excerpt)}</div>
          </article>
        `;
      }).join("") || '<div class="empty">没有匹配的证据</div>';
      document.querySelectorAll("[data-item]").forEach(node => {
        node.addEventListener("click", () => {
          state.itemId = node.dataset.item;
          renderDetail();
          renderItems();
        });
      });
      renderDetail();
    }

    function renderDetail() {
      const item = filteredItems().find(i => `${i.question_id}:${i.item_rank}` === state.itemId);
      if (!item) {
        $("detail").innerHTML = '<div class="empty">选择一条证据查看详情</div>';
        return;
      }
      const meta = item.metadata || {};
      const sourceRef = meta.source_ref || item.source_ref_id || "";
      const sourceLink = String(sourceRef).startsWith("http")
        ? `<a href="${esc(sourceRef)}" target="_blank" rel="noreferrer">${esc(sourceRef)}</a>`
        : esc(sourceRef);
      $("detail").innerHTML = `
        <h3>I${esc(item.item_rank)} · ${esc(item.item_type)}${item.item_subtype ? " / " + esc(item.item_subtype) : ""}</h3>
        <div class="item-meta">
          ${item.source_title ? `<span class="badge">${esc(item.source_title)}</span>` : ""}
          ${item.date ? `<span class="badge">${esc(item.date)}</span>` : ""}
          ${item.passage_index !== null && item.passage_index !== undefined ? `<span class="badge">p${esc(item.passage_index)}</span>` : ""}
          ${item.doc_id ? `<span class="badge">${esc(item.doc_id)}</span>` : ""}
        </div>
        ${item.relation_text ? `<div class="detail-section"><strong>关系</strong><p>${esc(item.relation_text)}</p></div>` : ""}
        ${item.concept_path?.length ? `<div class="detail-section"><strong>路径</strong><p>${esc(item.concept_path.join(" → "))}</p></div>` : ""}
        <div class="detail-section">
          <strong>证据片段</strong>
          <p>${esc(item.excerpt)}</p>
        </div>
        <div class="detail-section">
          <strong>来源</strong>
          <p>${sourceLink}</p>
        </div>
        <div class="detail-section">
          <strong>Metadata</strong>
          <pre>${esc(JSON.stringify(meta, null, 2))}</pre>
        </div>
      `;
    }

    function render() {
      renderStats();
      renderPackList();
      renderTypeFilter();
      renderSummary();
      renderItems();
    }

    $("packSearch").addEventListener("input", e => { state.packSearch = e.target.value; renderPackList(); });
    $("itemSearch").addEventListener("input", e => { state.itemSearch = e.target.value; renderItems(); });
    $("typeFilter").addEventListener("change", e => { state.typeFilter = e.target.value; renderItems(); });
    document.querySelectorAll("#modeButtons button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        document.querySelectorAll("#modeButtons button").forEach(b => b.classList.toggle("active", b === btn));
        renderItems();
      });
    });
    render();
  </script>
</body>
