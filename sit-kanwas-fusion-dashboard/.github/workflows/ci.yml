name: CI

on:
  push:
    branches:
      - main
      - harden-controller-boundary
  pull_request:

jobs:
  verify-workbench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Verify controller and config
        run: |
          python -m py_compile controller.py
          python -m json.tool adapters/adapter-registry.json > /dev/null
          python -m json.tool config.example.json > /dev/null

      - name: Run tests
        run: pytest -q
