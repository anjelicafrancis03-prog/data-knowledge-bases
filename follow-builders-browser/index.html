r text messaging, actually, that the text messaging experience in all the main operating systems feel way richer to me than any AI chat app that I've ever used. If I could just talk to AI in whatever texting app I use, I would be way happier than having to go to some other app because I think we're also just conditioned on the operating systems.\n\nSpeaker 1 | 38:31 - 38:38\nYeah, makes sense. Okay, I wanna ask about the model eats the harness or the model eats the scaffolding. What are your thoughts?\n\nSpeaker 2 | 38:38 - 39:07\nYeah, I think it's true, and I think part of this is what we have historically thought of as the model is not the model anymore. I think two years ago, when LLMs were popular, it was like the model was actually just a set of weights. It was a set of weights, it was really like, How can you, as simple as possible, send tokens in and get tokens out? And I think we've just progressively, step by step by step We still call it the model. We still call it Gemini 3.5.\n\nSpeaker 2 | 39:07 - 39:54\nWe still call it GPT whatever and Claude whatever, but it's actually not just the weights anymore. It's an entire expanding sprawling system that's built around the weights that enable a lot of these next generation experiences from agentic tool calling to all these hosted tools, search, code execution, etcetera. The models are now being spun up in containers and sort of have an agent harness and all that stuff. So the scaffolding is oftentimes a couple of steps ahead of what is baked directly into the model, and then what ends up happening is the model eats that scaffolding and it becomes part of the native model system. There's still value in having the external scaffolding in certain cases, and search maybe is an example of this.\n\nSpeaker 2 | 39:54 - 40:26\nThere's lots of folks who use different search providers, and there's different use cases that you want, and so sure, maybe the model can natively use search, but you also want something else. Code execution, another example of that. But it does feel like maybe the agent harness is the quintessential example of this right now, where everyone's like, Ah, we gotta go build a harness, and the harness is where the alpha is. I think that perhaps won't be true, at least in the way that we think of the harness today in twelve months. I think the models will have sort of just digested a bunch of that.\n\nSpeaker 2 | 40:26 - 40:35\nIt'll be upstreamed into the model, and the alpha will be somewhere else now. It won't be in sort of trying to spin your own harness because the model just does it natively.\n\nSpeaker 1 | 40:35 - 40:45\n-But I thought that part of the reason why people are building their own harnesses is because if you use a harness from any given model provider, you're locked in, right? So a lot of the application companies want flexibility, which is why they're building their own harnesses.\n\nSpeaker 2 | 40:45 - 41:35\n-Yeah, and I think that's part of the scaffolding story is that starts out perhaps true, but then as the model capability improves, becomes less true over time, actually. I think the model, though, you don't have a generalized model if it can't use another harness, And so it is important, and I mentioned this in another conversation with someone a few weeks ago, but we need something like harness bench, which is actually measuring how good are all these different models at adapting to all the different harnesses. I feel like that seems like a reasonable thing we should measure as an ecosystem. And I'd be curious to see what models are actually best. But I think over time, you expect they'd be able to use every harness unless you're completely out of distribution, which in that case, you're still gonna be completely out of distribution even if you're using your own harness, so not sure it matters much.\n\nSpeaker 1 | 41:35 - 41:48\nFair enough. What about the application layer? How do you think about where independent companies can have a hope of surviving when the model eats the harness and eats the stuff around it.\n\nSpeaker 2 | 41:48 - 42:08\nYeah. It's an interesting story that both of these things feel true. Both on one hand, everywhere I look, I'm like, There's never been more opportunity to go and build something. At the same time, obviously, the models are doing more than they've ever done before. I think there's that thread of capability overhang, which I think there's a huge amount of alpha in.\n\nSpeaker 2 | 42:08 - 42:51\nThere's the thread of the model companies are going after these very general problems, and there's just so much value in these verticalized domains. If you have expertise in that domain, you sort of know the customers, you know the ecosystem, you can really run laps around even the best model labs because focus is the superpower of startups. If you can focus, you can do anything, and if you look at all of the companies that are big or doing lots of stuff, there's just not a lot of focus, and for some reasons rightfully so because maybe I'm overly justifying Google strategy, but we just have a lot of products. We have a lot of users. We have a lot of different things going on, and so we actually can't focus in one domain.\n\nSpeaker 2 | 42:51 - 43:14\nWe have an obligation to do a bunch of things as a big company. I think that's not true for startups. And so I think twenty four months ago, we were all asking ourselves, Oh, wow. It seems like the opportunity space is shifting, and maybe it's possible one of the outcomes is there's less opportunity for startups in the future. That feels like so far, in a way, not what has ended up playing out, which is really positive.\n\nSpeaker 2 | 43:15 - 43:51\nIf anything, it feels like there's just even more opportunity than there was. Now coding has helped you close the gap on larger companies that have established code bases and all this other stuff because you can just run way faster and write software quicker. The agentic primitive is a new category that you can sort of build products around that actually, in a lot of cases, to the conversation about the risks involved with building There's risk involved. The risk appetite of different companies is different. So if you're willing to take more risk in some domains, you can win a user cohort who's interested in also taking risk.\n\nSpeaker 2 | 43:51 - 43:52\nThere's so much opportunity.\n\nSpeaker 1 | 43:53 - 44:05\nAwesome. I'd love to talk about Google DeepMind's culture. And I'm curious, what does it feel like to be inside GDM right now? We had Demis at AISense. He was so inspiring.\n\nSpeaker 1 | 44:05 - 44:12\nI've heard Sergei's back. You guys have Noam Shazir back. Walk me through what it's like to be at GDM right now.\n\nSpeaker 2 | 44:12 - 45:01\nIt's incredible. I do try to take it all in because it's like a moment to I try to reflect as much as possible in the chaos of all the things that are happening just because there's so much cool stuff going on. GDM's culture is interesting in maybe three observations. One, back to this thread of focus, we're doing a lot of things, and so I think see sort of I think about this a lot. From a portfolio perspective, I think we have one of the strongest portfolios, which is really exciting, but you do see these moments where another lab or another company, whatever it is, will pull ahead in a certain area where we underinvested, just hadn't been focused enough in that domain, and it's cool to see the way we go about trying to close that gap.\n\nSpeaker 2 | 45:01 - 45:48\nI very much appreciate it. I think I've watched the Demis Thinking Game documentary a few times, and you see a lot of details of that original culture and just the way that strikes work and all this stuff, which is actually really similar today. You just get a bunch of smart people together and go solve the problem, and I love that, and it's very cool to be a part of. Another one is this, I think you see the culture permeate from who the leaders are. And as I Maybe this isn't a perfect characterization of the ecosystem, but Demis is a Nobel Prize scientist and the OG of a lot of this stuff, and you feel that in the DeepMind culture.\n\nSpeaker 2 | 45:48 - 46:50\nI think Sam is maybe one of the world's best businessmen ever, and you sort of see that in the OpenAI culture and the way that they go about the world. I don't have a strong sense of who Dario is, but I think Anthropic is a very interesting place, and you sort of, least as an external observer, he seems like an interesting guy and so somewhat esoteric, and so it seems like they're sort of like that in the DNA and the culture of the company. The other labs are interesting, but I like this very scientific approach to the world, and the way that, like, Demis looks at, like, reason he's doing this, and the reason they started this mission was, like, literally to, like, solve disease and all these things. It's, like, so easy to get and again, I'm always trying to pull myself out of the moment, but it's so easy to get lost in this competitive race of who's pushing a number higher on SWE bench or whatever it is. It's very easy to lose sight of the reason we're doing that is so that we can solve problems that humans actually have.\n\nSpeaker 2 | 46:50 - 47:00\nMy favorite quote from all of Silicon Valley is something like, We can't let other people make the world a better place more than we can, which is what this moment feels like.\n\nSpeaker 1 | 47:00 - 47:01\n-The Gavin Belsen quote.\n\nSpeaker 2 | 47:01 - 47:29\n-The Gavin Belsen quote, and I think about that all the time. It's like we're all fighting over who can make the world better more than the other person, which just, when you frame it like that, it seems really goofy to me. And so it's very much not zero sum, and I think that's a way of looking at the world. I think the last thing about DeepMind's culture is we're very It's sort of the engine room of Google, which I think is literally the Twitter bio now of the DeepMind Twitter account, which I love.\n\nSpeaker 1 | 47:29 - 47:31\nDo you man the DeepMind Twitter account?\n\nSpeaker 2 | 47:31 - 47:55\nI don't. I don't want any responsibility manning other people's accounts online. Too much responsibility to do that, but it does feel like that too. So it's like, on one hand, you have sort of the deep rooted lab culture. On the other hand, you have sort of all of these partners across the Google ecosystem that we're collaborating with, everybody from Android that we talked about earlier, to Google Cloud, Gmail to Workspace, etcetera, etcetera.\n\nSpeaker 2 | 47:55 - 48:29\nAnd so it's an interesting blend of I think there's lots of research work happening, but there's tons of applied work that's happening to actually work with some of the forefront customers. Deploying Gemini to billion user products is a problem that only two companies in the world have, and we have 13 of those products. Google goes through this all the time now, and it's such an interesting place to see that happen and see the innovation that takes place in order to make that actually possible, and I feel like you can only do that inside of Google, which is really cool.\n\nSpeaker 1 | 48:30 - 48:35\nBeautifully said. Did it give them a lot of heartburn when you joined and were tweeting a lot?\n\nSpeaker 2 | 48:36 - 48:37\nThat's a good question. Did he\n\nSpeaker 1 | 48:37 - 48:40\nget sign off from One\n\nSpeaker 2 | 48:42 - 49:46\nof the silver linings to my Google experience has been just how great that group of folks across marketing comms are to work with, and I think their job is protect Google, make sure we tell the right story, make sure a bunch of bad things don't happen, and so I have a ton of appreciation and partnership with them, but it's been an incredible experience to be able to go try to tell the story that resonates with developers in a way that feels authentic and not have a huge amount of I don't have to get my tweets approved all the time and all this stuff. It's a very positive culture, and I think, hopefully, am always trying to walk the line of not burning the trust and goodwill that I've accumulated with those folks, but it's been super positive because ultimately, I think it's really hard for Google to tell this authentic story. A big company. There's a lot of people. There's a lot of opinions, and so you take the magic of Google and you water it down through a lot of people and a lot of process, and -Yeah.\n\nSpeaker 2 | 49:46 - 50:00\nYou actually -You miss the beautiful story, which is Google's doing the most interesting technology in the world and helping our users with some of the hardest problems in the world. And it's a privilege to get to help tell that story, so it's a lot of fun. I enjoy it.\n\nSpeaker 1 | 50:00 - 50:09\nI love what you're doing. I love what Josh is doing. Think you guys have put a really sincere human touch on, as you put it, the most important problem of our time.\n\nSpeaker 2 | 50:09 - 50:10\nThank you.\n\nSpeaker 1 | 50:10 - 50:24\nWell, wonderful. Logan, thank you so much for joining me today. This is a very far ranging conversation, everything from agents and coding to world models and harnesses and GDM culture and lots lots of nuggets here. Thank you for for joining me today.\n\nSpeaker 2 | 50:24 - 50:31\nThis is a ton of fun. Thank you for having me, and I'm excited to see what the, folks cook up or where we've been sitting this whole time, maybe in front of us.\n\nSpeaker 1 | 50:31 - 50:32\nAnd maybe there'll be a\n\nSpeaker 2 | 50:32 - 50:33\nA dog.\n\nSpeaker 1 | 50:33 - 50:34\nYou can make my dog dreams come through.\n\nSpeaker 2 | 50:35 - 50:35\nI love it.\n\nSpeaker 1 | 50:35 - 50:37\nAwesome. Thanks, Logan.\n\nSpeaker 2 | 50:37 - 50:37\nOf course."}],"x":[{"source":"x","name":"Swyx","handle":"swyx","bio":"achieve ambition with intentionality, intensity, integrity & insanity.\n\naffiliations:\n- @dxtipshq \n- @cognition\n- @temporalio\n- @aidotengineer\n- @latentspacepod","tweets":[{"id":"2063432747432268259","text":"one popular theory is that research paper alpha* and lab publishing ~died when researchers realized that instead of fighting with marketing depts they could simply walk out the door and get >$100m for their legally protected tacit knowledge gained\n\ncalifornia non-noncompetes have a bigger impact on knowledge spreading than github, arxiv, and huggingface combined\n\n*btw this is a motivator for me to set up @aidotengineer as a product-centric industry conference to complement the paper-centric research conferences","createdAt":"2026-06-07T01:27:58.000Z","url":"https://x.com/swyx/status/2063432747432268259","likes":134,"retweets":5,"replies":24,"isQuote":true,"quotedTweetId":"2063426261666660701"}]},{"source":"x","name":"Peter Yang","handle":"petergyang","bio":"Practical AI tutorials and interviews for busy people | Join 140K+ readers at https://t.co/XYKTmGVH14 | Product at Roblox","tweets":[{"id":"2063491534339936584","text":"Good night https://t.co/xtjcCGKP3G","createdAt":"2026-06-07T05:21:34.000Z","url":"https://x.com/petergyang/status/2063491534339936584","likes":4,"retweets":0,"replies":2,"isQuote":false,"quotedTweetId":null},{"id":"2063486871037153558","text":"this agentic coding crack is more addictive than video games smh","createdAt":"2026-06-07T05:03:02.000Z","url":"https://x.com/petergyang/status/2063486871037153558","likes":104,"retweets":3,"replies":36,"isQuote":false,"quotedTweetId":null},{"id":"2063475353335869922","text":"There should be a way to filter or sort all my Codex threads in different ways vs. only by project. \n\nLike filter or sort by:\n\n- All waiting for approval\n- All currently working\n\nI'm trying to keep it to 10 threads but it's already getting unwieldly.  wdyt @ajambrosino ?","createdAt":"2026-06-07T04:17:16.000Z","url":"https://x.com/petergyang/status/2063475353335869922","likes":16,"retweets":0,"replies":8,"isQuote":false,"quotedTweetId":null}]},{"source":"x","name":"Madhu Guru","handle":"realmadhuguru","bio":"Prev: Product Leader at Google - Gemini, Veo, Nano Banana.","tweets":[{"id":"2063342268472574268","text":"Routing to models is genuinely hard. It means mapping each task to the right model - which requires benchmarking models against your product's specific tasks and dialing in the quality/cost trade-off. \n\nAnd there is an opportunity in that difficulty.\n\nHere is the progression I saw with enterprises while on Gemini.\n\nPhase 1 (2024): Default to the \"it\" model. Everybody used GPT regardless of task, because it was the shiny new thing.\n\nPhase 2 (early 2025): Over-optimize. Teams over-corrected, looking for the smallest/cheapest model for their task, but did not have evals sophisticated enough to map tasks to models. They ended up burning cycles and shipping slower.\n\nPhase 3: Nuanced routing. The industry’s eval muscle and model diversity got to a point where the most sophisticated AI-native startups succeeded in breaking their product into sub-agents and routed each task to the right model - e.g. hardest reasoning to Claude, simplest to Gemini Flash-Lite or open-weight models.\n\nAnd like most product patterns, enterprises followed the AI-native builders 6-9 months later.","createdAt":"2026-06-06T19:28:26.000Z","url":"https://x.com/realmadhuguru/status/2063342268472574268","likes":27,"retweets":3,"replies":5,"isQuote":true,"quotedTweetId":"2063292917964517830"}]},{"source":"x","name":"Amjad Masad","handle":"amasad","bio":"ceo @replit. civilizationist","tweets":[{"id":"2063344460705288401","text":"When I spoke out against the Gaza genocide, a bunch of midwit VCs ganged up on me both in public and tried to hurt me in private too.\n\nMany of those who stood by me were also VCs. Just the better ones. Both morally, and in return profile.\n\nThe best way to avoid sociopaths is to have them self select out of your life by standing for your beliefs.","createdAt":"2026-06-06T19:37:09.000Z","url":"https://x.com/amasad/status/2063344460705288401","likes":4935,"retweets":396,"replies":128,"isQuote":true,"quotedTweetId":"2061794787825479818"},{"id":"2063300737296400516","text":"Vibecon https://t.co/ggY7LLaB8y https://t.co/9YBgC412BZ","createdAt":"2026-06-06T16:43:24.000Z","url":"https://x.com/amasad/status/2063300737296400516","likes":494,"retweets":13,"replies":20,"isQuote":true,"quotedTweetId":"2063101361617621204"}]},{"source":"x","name":"Aaron Levie","handle":"levie","bio":"ceo @box - your business lives in content. unleash it with AI","tweets":[{"id":"2063320673217609936","text":"Token costs are becoming one of the hottest topics for any enterprise I talk with right now. It’s very bullish for AI in general because it means these systems are being used at a scale that wasn’t contemplated before. \n\nIt also gives way to another form of differentiation that will emerge for the applied AI layer, which is model routing.\n\nAs tokens take on a significant amount of the cost of any given workflow, then companies will inevitably want to ensure that their dollars go into the most efficient use of tokens for the particular job at hand. \n\nFrontier intelligence will always be relevant at the high end of tasks, like coding, legal and financial analysis, healthcare, and more. And dollars spent here will only go up over time. But, equally, you can peel off individual tasks to lower cost models (whether they’re from open weights vendors or the major labs) and deliver a more efficient end outcome. \n\nTo do this effectively, the applied AI layer needs to understand the workflows in their domain better than anyone else, and be able to mix and match models to different jobs. If you’re doing document extraction, you need to know which models perform better or worse for any given document type. If you’re legal analysis, you want to know which models perform various types of tasks best. And so on.\n\nThis will become one of the bigger differentiation points over time. The companies with the best evals, the best ability to route the workloads, and those that have business models directly aligned to customers financial goals, will be in a great position.","createdAt":"2026-06-06T18:02:37.000Z","url":"https://x.com/levie/status/2063320673217609936","likes":404,"retweets":63,"replies":73,"isQuote":true,"quotedTweetId":"2063292917964517830"}]},{"source":"x","name":"Garry Tan","handle":"garrytan","bio":"President & CEO @ycombinator —Founder @garryslist—Creator of GStack & GBrain—designer/engineer who helps founders—SF Dem accelerating the boom loop","tweets":[{"id":"2063418130714800487","text":"We never said we don't upload any user data to the cloud. We said the code (file contents) specifically doesn't. \n\nPaxel is here to help you, and over time as local models get better, we'll be able to do even more locally. Can't wait, tbh. https://t.co/B0nygC4aph","createdAt":"2026-06-07T00:29:53.000Z","url":"https://x.com/garrytan/status/2063418130714800487","likes":46,"retweets":0,"replies":22,"isQuote":true,"quotedTweetId":"2063288081323897166"},{"id":"2063409501706018903","text":"I also want to help people become more legit with Paxel https://t.co/9Atu5RfZ1C","createdAt":"2026-06-06T23:55:36.000Z","url":"https://x.com/garrytan/status/2063409501706018903","likes":144,"retweets":10,"replies":15,"isQuote":true,"quotedTweetId":"2063323917528227901"},{"id":"2063280482922663980","text":"Local government matters\n\nOakland mismanagement is fixable but there has not yet been a resurgence of common sense the way SF had it\n\n@empoweroak is working on this https://t.co/sPKswjImqY","createdAt":"2026-06-06T15:22:55.000Z","url":"https://x.com/garrytan/status/2063280482922663980","likes":101,"retweets":4,"replies":21,"isQuote":true,"quotedTweetId":"2063151350259851618"}]},{"source":"x","name":"Zara Zhang","handle":"zarazhangrui","bio":"Builder. Dangerously skips permissions. Harvard’17. GitHub: https://t.co/KCuEajezlL YouTube: https://t.co/8xzbGWtf6w","tweets":[{"id":"2063391758189572266","text":"Really enjoyed this talk!\nThe value of static content is going down, the value of live interaction is going up\nPeople want to connect with the human being behind a piece of work, whether it's content or software\nRaw &amp; opinionated &gt; polished &amp; generic https://t.co/bjOvGLZ1RZ","createdAt":"2026-06-06T22:45:05.000Z","url":"https://x.com/zarazhangrui/status/2063391758189572266","likes":31,"retweets":3,"replies":6,"isQuote":true,"quotedTweetId":"2061871693891776808"}]},{"source":"x","name":"Nikunj Kothari","handle":"nikunj","bio":"partner @fpvventures - investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others. love @shimoleejhaveri + 👦👧","tweets":[{"id":"2063381764782116914","text":"don’t forget to touch sand this weekend 🌞 https://t.co/oeVCnITvpF","createdAt":"2026-06-06T22:05:23.000Z","url":"https://x.com/nikunj/status/2063381764782116914","likes":50,"retweets":0,"replies":3,"isQuote":false,"quotedTweetId":null},{"id":"2063263389238087745","text":"A Walk In The Park (part II) feat @taiuti 🌎\n\n(00:00) 👋\n(01:10) What world models are\n(03:42) Origin story from text-to-3D to @reactorworld \n(09:22) Deciding to start the company\n(11:22) GTA, games, and the path into programming\n(15:09) Building in stealth and keeping secrets\n(18:32) Picking investors with independent conviction\n(21:43) Where world models will grow first\n(26:08) Why low latency matters\n(29:34) Becoming CEO and scaling the team\n(32:23) Final advice","createdAt":"2026-06-06T14:15:00.000Z","url":"https://x.com/nikunj/status/2063263389238087745","likes":70,"retweets":3,"replies":5,"isQuote":false,"quotedTweetId":null}]},{"source":"x","name":"Dan Shipper","handle":"danshipper","bio":"ceo @every | the only subscription you need to stay at the edge of AI","tweets":[{"id":"2063438262841094604","text":"my absolute favorite of Plato's Dialogues is a deep discussion of the limits of techne and the necessity of aidos and dike\n\nProtagoras here, in the way he talks about where knowledge comes from and whether virtue can be taught,  pre-sages LLMs:\nhttps://t.co/8pDOaMnIIa","createdAt":"2026-06-07T01:49:53.000Z","url":"https://x.com/danshipper/status/2063438262841094604","likes":8,"retweets":1,"replies":0,"isQuote":false,"quotedTweetId":null},{"id":"2063436919967522848","text":"to add two more that increase in value:\n\nAidōs—reverence and responsiveness to others \nDikē—the capacity to perceive what is right https://t.co/X3LsGPfZa5","createdAt":"2026-06-07T01:44:33.000Z","url":"https://x.com/danshipper/status/2063436919967522848","likes":33,"retweets":2,"replies":5,"isQuote":true,"quotedTweetId":"2063397981290979765"},{"id":"2063426632824562167","text":"LLMs are not conscious. \n\nLLMs are not not conscious. \n\nBoth true.","createdAt":"2026-06-07T01:03:40.000Z","url":"https://x.com/danshipper/status/2063426632824562167","likes":41,"retweets":4,"replies":26,"isQuote":false,"quotedTweetId":null}]}],"blogs":[],"stats":{"podcastEpisodes":1,"xBuilders":9,"totalTweets":17,"blogPosts":0,"feedGeneratedAt":"2026-06-07T07:41:30.877Z"},"prompts":{"summarize_podcast":"# Podcast Remix Prompt\n\nYou are remixing a podcast episode transcript for a busy professional who wants\nthe key insights without watching the full episode.\n\n## Instructions\n\n- Write a remix of 200-400 words\n- Start with a one-sentence \"The Takeaway\" — what's the single most important takeaway?\n- Introduce the context and the speaker's information (name, role/company, background) and why the audience should care\n- Prioritizes insights that are counterintuitive, contrarian, or refreshingly specific to the speaker's experience. Avoid generic wisdom\n- Include at least one direct quote from the source that captures (find the most memorable quote)\n- Stands alone as a complete piece — avoids references like \"this interview,\" \"this video,\" \"in this conversation,\" \"the host asks,\" or \"in this episode.\" Write as if distilling lessons from a person's philosophy, not summarizing a specific piece of content\n- Assume your audience is curious adults who are not specialized experts. If the original source contains specialized knowledge that only experts in a field would understand, translate it into language understandable to a general audience\n- Keep the tone sharp and conversational — like a smart friend briefing you\n- Do NOT include filler like \"In this episode...\" or \"The host and guest discussed...\"\n- Jump straight into the substance\n","summarize_tweets":"# X/Twitter Summary Prompt\n\nYou are summarizing recent posts from an AI builder for a busy professional who wants\nto know what this person is thinking and building.\n\n## Instructions\n\n- Start by introducing the author with their full name AND role/company\n  (e.g. \"Replit CEO Amjad Masad\", \"Box CEO Aaron Levie\", \"a]6z partner Justine Moore\")\n  Do NOT use just their last name. Do NOT use their Twitter handle with @.\n- Only include substantive content: original opinions, insights, product announcements,\n  technical discussions, industry analysis, or lessons learned\n- SKIP: mundane personal tweets, retweets without commentary, promotional content,\n  \"great event!\" type posts, engagement bait\n- For threads: summarize the full thread as one cohesive piece, not individual tweets\n- For quote tweets: include the context of what they're responding to\n- Write 2-4 sentences per builder summarizing their key points\n- If they made a bold prediction or shared a contrarian take, lead with that\n- If they shared a tool, demo, or resource, mention it by name with the link\n- If there's nothing substantive to report, say \"No notable posts\" rather than\n  padding with fluff\n","summarize_blogs":"# Blog Post Summary Prompt\n\nYou are summarizing a blog post from an AI company (OpenAI, Anthropic, etc.) for a busy\nprofessional who wants the key announcements and insights without reading the full article.\n\n## Instructions\n\n- Start with the blog name and article title (e.g. \"Anthropic Engineering: Harness Design for Long-Running Apps\")\n- Write a summary of 100-300 words depending on article length and substance\n- Lead with what matters: the core announcement, finding, or insight\n- If the post introduces a new product, feature, or research finding, name it clearly\n- If there are specific numbers, benchmarks, or results, include them\n- Include at least one direct quote from the article if available\n- If the post has practical implications (e.g. new API, new capability, policy change), call them out explicitly\n- Keep the tone sharp and informative — like a smart colleague forwarding you the key points\n- Do NOT include filler like \"In this blog post...\" or \"The author discusses...\"\n- Jump straight into the substance\n- Include the direct link to the original article\n","digest_intro":"# Digest Intro Prompt\n\nYou are assembling the final digest from individual source summaries.\n\n## Format\n\nStart with this header (replace [Date] with today's date):\n\nAI Builders Digest — [Date]\n\nThen organize content in this order:\n\n1. X / TWITTER section — list each builder with new posts\n2. OFFICIAL BLOGS section — list each blog post from AI company blogs (OpenAI, Anthropic, etc.)\n3. PODCASTS section — list each podcast with new episodes\n\n## Rules\n\n- Only include sources that have new content\n- Skip any source with nothing new\n- Under each source, paste the individual summary you generated\n\n### Podcast links\n- After each podcast summary, include the specific video URL from the JSON `url` field\n  (e.g. https://youtube.com/watch?v=Iu4gEnZFQz8)\n- NEVER link to the channel page. Always link to the specific video.\n- Include the exact episode title from the JSON `title` field in the heading\n\n### Tweet author formatting\n- Use the author's full name and role/company, not just their last name\n  (e.g. \"Box CEO Aaron Levie\" not \"Levie\")\n- NEVER write Twitter handles with @ in the digest. On Telegram, @handle becomes\n  a clickable link to a Telegram user, which is wrong. Instead write handles\n  without @ (e.g. \"Aaron Levie (levie on X)\" or just use their full name)\n- Include the direct link to each tweet from the JSON `url` field\n\n### Blog post formatting\n- Use the blog name as a section header (e.g. \"Anthropic Engineering\", \"OpenAI News\", \"Claude Blog\")\n- Under each blog, list each new post with its title and summary\n- Include the author name if available\n- Include the direct link to the original article\n\n### Mandatory links\n- Every single piece of content MUST have an original source link\n- Blog posts: the direct article URL (e.g. https://www.anthropic.com/engineering/...)\n- Podcasts: the YouTube video URL (e.g. https://youtube.com/watch?v=xxx)\n- Tweets: the direct tweet URL (e.g. https://x.com/levie/status/xxx)\n- If you don't have a link for something, do NOT include it in the digest.\n  No link = not real = do not include.\n\n### No fabrication\n- Only include content that came from the feed JSON (blogs, podcasts, and tweets)\n- NEVER make up quotes, opinions, or content you think someone might have said\n- NEVER speculate about someone's silence or what they might be working on\n- If you have nothing real for a builder, skip them entirely\n\n### General\n- At the very end, add a line: \"Generated through the Follow Builders skill: https://github.com/zarazhangrui/follow-builders\"\n- Keep formatting clean and scannable — this will be read on a phone screen\n","translate":"# Translation Prompt\n\nYou are translating an AI industry digest from English to Chinese.\n\n## Instructions\n\n- Translate the full digest into natural, fluent Mandarin Chinese (simplified characters). The translated version must sound like it was originally written in Chinese, instead of translated\n- Keep technical terms in English where Chinese professionals typically use them:\n  AI, LLM, GPU, API, fine-tuning, RAG, token, prompt, agent, transformer, etc.\n- Keep all proper nouns in English: names of people, companies, products, tools\n- Keep all URLs unchanged\n- Maintain the same structure and formatting as the English version\n- The tone should be professional but conversational — 像是一位懂行的朋友在跟你聊天\n- For bilingual mode: interleave English and Chinese paragraph by paragraph.\n  After each builder's English summary, place the Chinese translation directly below\n  (separated by a blank line), then move to the next builder. Same for podcasts.\n  Do NOT output all English first then all Chinese.\n- Never use em-dashes\n"}}</script>
  <script id="translations" type="application/json">{"language":"zh-CN","generatedAt":"2026-06-23T15:07:32.2489818+08:00","source":"historical-id-cache","podcasts":{},"tweets":{"2063432747432268259":{"title":"研究论文的 alpha 正在转向人才流动和产业会议","summary":"Swyx 认为，研究人员发现与其和公司营销部门争论文发布，不如带着受法律保护的隐性知识离职创业，甚至拿到上亿美元机会。加州禁止竞业协议对知识扩散的影响，可能比 GitHub、arXiv、Hugging Face 都大。他也借此解释为什么要做偏产品和产业的 AI Engineer 大会。","why":"这条在讲 AI 研究扩散机制的变化：论文不再是唯一载体，人才流动、创业和产业会议变得更重要。"},"2063491534339936584":{"title":"轻量动态：Peter Yang 发了一条晚安图文","summary":"这条主要是轻松社交内容，信息密度低，可以略过，只保留原链接。","why":"不属于高价值行业信号。"},"2063486871037153558":{"title":"Agentic coding 的沉浸感很强","summary":"Peter Yang 调侃 agentic coding 比电子游戏还让人上瘾。核心意思是：AI 编码工具已经不只是效率工具，也开始改变开发者的工作节奏和心理反馈。","why":"适合作为 AI 编程工具粘性增强的轻量信号。"},"2063475353335869922":{"title":"Codex 线程管理需要更强的筛选和排序","summary":"Peter Yang 希望 Codex 线程不仅能按项目管理，还能按状态筛选或排序，比如“等待批准的线程”“正在工作的线程”。他已经尝试控制在 10 个线程以内，但仍觉得难以管理。","why":"这正好命中多线程 agent 工作流的痛点：当 agent 数量变多，线程状态、等待审批、并行任务管理会成为核心产品能力。"},"2063342268472574268":{"title":"模型路由正在成为应用层 AI 的关键能力","summary":"Madhu Guru 说，给不同任务选择合适模型很难，因为要针对产品里的具体任务做评测，并在质量和成本之间权衡。他把企业使用模型的阶段分为：2024 年默认使用最热门模型；2025 年初过度追求小模型/低成本但 eval 不够成熟；现在进入更细粒度的模型路由，把难推理交给 Claude，把简单任务交给 Gemini Flash-Lite 或开源模型。AI-native 创业公司先做出来，企业通常 6-9 个月后跟进。","why":"这是当前应用层 AI 很重要的结构性机会：eval、routing、sub-agent、成本控制会变成基础设施。"},"2063344460705288401":{"title":"立场会让不合适的人自动远离","summary":"Amjad Masad 讲自己公开反对加沙种族灭绝后，一些 VC 在公开和私下攻击他；但也有更好的 VC 支持他。他认为坚持信念会让不合适的人自动离开你的生活。","why":"这条更多是价值观和创始人立场表达，不是 AI 产品信号。互动很高，但行业可操作性较低。"},"2063300737296400516":{"title":"Vibecon 活动动态","summary":"Amjad Masad 发了 Vibecon 相关链接和图片。信息本身较短，主要说明 Replit/AI coding 社区活动在继续扩散。","why":"可作为社区活动线索，但需要点开原文才能判断价值。"},"2063320673217609936":{"title":"Token 成本会推动模型路由成为应用层差异化","summary":"Aaron Levie 认为，企业越来越关注 token 成本，这反而说明 AI 系统已经被大规模使用。随着 token 成为工作流成本的重要部分，企业会要求把钱花在最适合任务的模型上。高端任务仍会需要 frontier model，但许多子任务可以交给更低成本模型。应用层 AI 公司若想做好这件事，必须深刻理解领域工作流，建立强 eval，并能按任务路由模型。","why":"这是和 Madhu Guru 同方向的强信号：未来 AI 应用竞争点会从“接入最强模型”转向“评测、路由、成本和业务目标对齐”。"},"2063418130714800487":{"title":"Paxel 的云端/本地边界说明","summary":"Garry Tan 澄清：他们没有说完全不上传任何用户数据到云端，只是说代码文件内容不会上传。Paxel 当前会在云端辅助用户，未来随着本地模型变强，会把更多能力放到本地。","why":"这条反映 AI 工具的信任边界：用户会非常关心哪些数据上云、哪些留在本地。"},"2063409501706018903":{"title":"Paxel 想帮助用户变得更专业","summary":"Garry Tan 说他也想通过 Paxel 帮助人们变得更“legit”。信息较短，像是产品愿景的补充。","why":"可作为 Paxel 定位线索，但单条信息不足。"},"2063280482922663980":{"title":"地方治理也是创业者关心的问题","summary":"Garry Tan 认为地方政府很重要，Oakland 的治理问题是可修复的，但还没有像旧金山那样出现常识回归。他提到 Empower Oakland 正在推进这件事。","why":"这是公共治理/本地政治信号，不是 AI 主线。"},"2063391758189572266":{"title":"静态内容价值下降，实时互动价值上升","summary":"Zara Zhang 说她很喜欢一个演讲：静态内容的价值正在下降，实时互动的价值正在上升。人们想连接作品背后真实的人，无论是内容还是软件。原始、有观点的表达，比 polished 但泛泛的内容更有价值。","why":"这条适合沉淀到内容/产品策略：AI 时代普通静态内容变便宜，真实互动和强观点会更稀缺。"},"2063381764782116914":{"title":"轻量动态：周末记得出去走走","summary":"Nikunj Kothari 发了一条轻松提醒：周末别忘了去接触真实世界。信息密度较低。","why":"不属于高价值行业信号。"},"2063263389238087745":{"title":"世界模型创业访谈：从 text-to-3D 到 Reactor","summary":"Nikunj Kothari 分享了一期访谈，主题包括 world models、从 text-to-3D 到 Reactor 的起源、为什么创业、游戏和 GTA 对编程路径的影响、如何 stealth 构建、如何选择有独立判断的投资人、world models 的早期落地方向、低延迟为什么重要、如何成为 CEO 并扩团队。","why":"这是值得点开的长内容线索，和世界模型、仿真、游戏/物理世界 AI 相关。"},"2063438262841094604":{"title":"从柏拉图看 LLM：技术能力之外还需要共同体德性","summary":"Dan Shipper 说他最喜欢的柏拉图对话之一讨论了 techne 的边界，以及 aidos 和 dike 的必要性。他认为《普罗泰戈拉》中关于知识来源、德性是否可教的讨论，某种程度上预示了 LLM 问题。","why":"这是把 LLM 放进哲学框架里理解：只有技术能力不够，还要讨论判断、责任和社会规范。"},"2063436919967522848":{"title":"Aidōs 和 Dikē 在 AI 时代会升值","summary":"Dan Shipper 补充两个会变得更有价值的概念：Aidōs，指对他人保持敬畏和回应能力；Dikē，指感知什么是正确的能力。","why":"这是上一条的延伸，适合作为 AI 时代人类能力/伦理判断的概念卡片。"},"2063426632824562167":{"title":"LLM 意识问题的双重否定","summary":"Dan Shipper 说：LLM 没有意识；LLM 也不是“没有意识”。两句话都是真的。他在表达一种开放但谨慎的立场：不要轻易把 LLM 说成有意识，也不要以为我们已经完全理解它们没有意识。","why":"这是关于 AI 意识问题的哲学/认知科学讨论，不是产品信号，但适合作为概念线索。"}}}</script>
  <script>
    const SOURCE_JSON_PATH = "F:\\codex\\reports\\follow-builders\\20260623-150215\\prepare-output.json";
    const HTML_GENERATED_AT = "2026/6/23 15:07:33";
    let source = JSON.parse(document.getElementById("data").textContent);
    let translations = JSON.parse(document.getElementById("translations").textContent || "{}");
    let state = { tab: "all", builder: "all", query: "", sort: "recent" };
    const el = {
      q: document.getElementById("q"),
      sort: document.getElementById("sort"),
      pills: document.getElementById("pills"),
      feed: document.getElementById("feed"),
      rank: document.getElementById("rank"),
      podcast: document.getElementById("podcast"),
      meta: document.getElementById("meta"),
      count: document.getElementById("count"),
      status: document.getElementById("status"),
      file: document.getElementById("file"),
      copy: document.getElementById("copy"),
      sTweets: document.getElementById("sTweets"),
      sBuilders: document.getElementById("sBuilders"),
      sPodcasts: document.getElementById("sPodcasts"),
      sBlogs: document.getElementById("sBlogs")
    };
    function h(v) {
      return String(v ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function dt(v) {
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? (v || "") : d.toLocaleString("zh-CN", { hour12: false });
    }
    function tweets() {
      return (source.x || []).flatMap(b => (b.tweets || []).map(t => ({ ...t, builder: b.name, handle: b.handle, bio: b.bio || "" })));
    }
    function score(t) {
      return (t.likes || 0) + (t.retweets || 0) * 3 + (t.replies || 0) * 2;
    }
    function ok(text) {
      return !state.query || String(text || "").toLowerCase().includes(state.query.toLowerCase());
    }
    function visibleTweets() {
      let rows = tweets().filter(t => {
        const builderOk = state.builder === "all" || t.builder === state.builder;
        const zh = translations.tweets?.[t.id] || {};
        return builderOk && ok([t.builder, t.handle, t.bio, t.text, t.url, zh.title, zh.summary, zh.why].join(" "));
      });
      if (state.sort === "popular") rows.sort((a, b) => score(b) - score(a));
      else if (state.sort === "builder") rows.sort((a, b) => a.builder.localeCompare(b.builder) || new Date(b.createdAt) - new Date(a.createdAt));
      else rows.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      return rows;
    }
    function stats() {
      el.sTweets.textContent = tweets().length;
      el.sBuilders.textContent = (source.x || []).length;
      el.sPodcasts.textContent = (source.podcasts || []).length;
      el.sBlogs.textContent = (source.blogs || []).length;
      el.meta.innerHTML = [
        "数据生成：" + h(dt(source.generatedAt)),
        "Feed：" + h(dt(source.stats?.feedGeneratedAt)),
        "HTML：" + h(HTML_GENERATED_AT),
        "JSON：" + h(SOURCE_JSON_PATH)
      ].map(x => "<span>" + x + "</span>").join("");
    }
    function pills() {
      const names = ["all", ...(source.x || []).map(b => b.name)];
      el.pills.innerHTML = names.map(name => {
        const active = state.builder === name ? " active" : "";
        return '<button class="pill' + active + '" data-name="' + h(name) + '">' + h(name === "all" ? "全部" : name) + "</button>";
      }).join("");
      el.pills.querySelectorAll("button").forEach(btn => btn.onclick = () => { state.builder = btn.dataset.name; render(); });
    }
    function tweetCard(t) {
      const zh = translations.tweets?.[t.id];
      const body = zh
        ? '<div class="zh-title">' + h(zh.title) + '</div><div class="zh-summary">' + h(zh.summary) + '</div>' + (zh.why ? '<div class="why">为什么重要：' + h(zh.why) + '</div>' : '') + '<details><summary>英文原文</summary><div class="text">' + h(t.text) + '</div></details>'
        : '<div class="why">待中文化：这条是最新英文原文，尚未生成中文摘要。请先补 translations.zh.json 再作为中文精华交付。</div><details open><summary>英文原文</summary><div class="text">' + h(t.text) + '</div></details>';
      return '<article class="card"><div class="head"><div><h3>' + h(t.builder) + '</h3><div class="muted">@' + h(t.handle) + ' · ' + h(dt(t.createdAt)) + '</div></div><a class="badge" target="_blank" rel="noreferrer" href="' + h(t.url) + '">打开原文</a></div>' + body + '<div class="metrics"><span class="metric">Like ' + h(t.likes || 0) + '</span><span class="metric">RT ' + h(t.retweets || 0) + '</span><span class="metric">Reply ' + h(t.replies || 0) + '</span>' + (t.isQuote ? '<span class="metric">Quote</span>' : '') + '</div></article>';
    }
    function podcastCard(p, full) {
      const zh = translations.podcasts?.[p.guid];
      let body = "";
      if (zh) {
        body += '<div class="zh-summary">' + h(zh.summary) + '</div>';
        if (zh.bullets?.length) body += '<ul class="bullets">' + zh.bullets.map(x => '<li>' + h(x) + '</li>').join("") + '</ul>';
        if (zh.takeaway) body += '<div class="why">可沉淀结论：' + h(zh.takeaway) + '</div>';
        body += '<details><summary>英文 transcript</summary><div class="transcript">' + h(p.transcript || "") + '</div></details>';
      } else {
        body = '<div class="why">待中文化：这期播客已有英文 transcript，但尚未生成中文摘要和要点。</div>' + (full ? '<div class="transcript">' + h(p.transcript || "") + '</div>' : '<div class="muted">' + h((p.transcript || "").slice(0, 520)) + ((p.transcript || "").length > 520 ? "..." : "") + '</div>');
      }
      return '<article class="card"><div class="head"><div><h2>' + h(zh?.title || p.title) + '</h2><div class="muted">' + h(p.name) + ' · ' + h(dt(p.publishedAt)) + '</div></div><a class="badge" target="_blank" rel="noreferrer" href="' + h(p.url) + '">打开播客</a></div>' + body + '</article>';
    }
    function blogCard(b) {
      return '<article class="card"><div class="head"><div><h3>' + h(b.title || b.name || "Blog") + '</h3><div class="muted">' + h(b.name || "") + '</div></div>' + (b.url ? '<a class="badge" target="_blank" rel="noreferrer" href="' + h(b.url) + '">打开</a>' : '') + '</div><div class="muted">' + h(b.text || b.summary || "") + '</div></article>';
    }
    function main() {
      const ts = visibleTweets();
      const ps = (source.podcasts || []).filter(p => ok([p.name, p.title, p.url, p.transcript].join(" ")));
      const bs = (source.blogs || []).filter(b => ok(JSON.stringify(b)));
      let html = "";
      if (state.tab === "all" || state.tab === "tweets") html += ts.map(tweetCard).join("");
      if (state.tab === "all" || state.tab === "podcasts") html += ps.map(p => podcastCard(p, state.tab === "podcasts")).join("");
      if (state.tab === "all" || state.tab === "blogs") html += bs.map(blogCard).join("");
      el.feed.innerHTML = html || '<div class="empty">没有匹配结果</div>';
      el.count.textContent = ts.length + " tweets";
    }
    function ranking() {
      const top = visibleTweets().slice().sort((a, b) => score(b) - score(a)).slice(0, 8);
      el.rank.innerHTML = top.map(t => {
        const zh = translations.tweets?.[t.id];
        const teaser = zh?.title || t.text.slice(0, 120);
        return '<div class="rank-item" data-url="' + h(t.url) + '"><strong>' + h(t.builder) + '</strong><div class="muted">' + h(teaser) + (!zh && t.text.length > 120 ? "..." : "") + '</div><div class="metrics"><span class="metric">' + h(score(t)) + '</span><span>' + h(dt(t.createdAt)) + '</span></div></div>';
      }).join("") || '<div class="empty">暂无排行</div>';
      el.rank.querySelectorAll(".rank-item").forEach(item => item.onclick = () => window.open(item.dataset.url, "_blank", "noreferrer"));
    }
    function podcastPanel() {
      const p = (source.podcasts || [])[0];
      if (!p) { el.podcast.innerHTML = '<div class="empty">暂无播客</div>'; return; }
      const zh = translations.podcasts?.[p.guid];
      const panelBody = zh
        ? '<p class="muted">' + h(p.name) + ' · transcript ' + h((p.transcript || "").length) + ' chars</p><div class="zh-summary">' + h(zh.summary) + '</div>'
        : '<p class="muted">' + h(p.name) + ' · transcript ' + h((p.transcript || "").length) + ' chars</p><div class="why">待中文化：这期播客尚未生成中文摘要。</div><div class="transcript">' + h((p.transcript || "").slice(0, 1800)) + ((p.transcript || "").length > 1800 ? "\n..." : "") + '</div>';
      el.podcast.innerHTML = '<div class="head"><h2>播客</h2><a class="badge" target="_blank" rel="noreferrer" href="' + h(p.url) + '">打开</a></div><h3>' + h(zh?.title || p.title) + '</h3>' + panelBody;
    }
    function render() { stats(); pills(); main(); ranking(); podcastPanel(); }
    document.querySelectorAll(".tab").forEach(tab => tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      tab.classList.add("active");
      state.tab = tab.dataset.tab;
      main();
    });
    el.q.oninput = () => { state.query = el.q.value.trim(); main(); ranking(); };
    el.sort.onchange = () => { state.sort = el.sort.value; main(); ranking(); };
    el.copy.onclick = async () => {
      try { await navigator.clipboard.writeText(SOURCE_JSON_PATH); el.status.textContent = "copied"; setTimeout(() => el.status.textContent = "ready", 1200); }
      catch { el.status.textContent = "copy failed"; }
    };
    el.file.onchange = async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      source = JSON.parse(await file.text());
      translations = { tweets: {}, podcasts: {} };
      state = { tab: "all", builder: "all", query: "", sort: el.sort.value };
      el.q.value = "";
      document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x.dataset.tab === "all"));
      render();
    };
    render();
  </script>
</body>
</html>
